<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperAI</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
:root {
  --accent: #7c6cf0;
  --bg: #0e0e12;
  --bg2: #15151a;
  --bg3: #1c1c24;
  --bd: rgba(255,255,255,.065);
  --tx: #ededf4;
  --t2: #80809a;
  --r: 12px;
  --rs: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  margin: 0;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* Auth buttons */
#authContainer {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 999;
  display: flex;
  gap: 8px;
}
#authContainer button {
  padding: 8px 12px;
  border: none;
  border-radius: var(--rs);
  cursor: pointer;
  font-weight: 600;
  background: var(--accent);
  color: white;
}

/* Sign-out */
#signOutBtn {
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;
  background:#555;
  color:#fff;
  border:none;
  padding:8px 12px;
  border-radius:4px;
  cursor:pointer;
}

/* Sidebar */
#sidebar {
  width: 250px;
  background: var(--bg2);
  flex-direction: column;
  display: none;
  height: 100%;
  border-right: 1px solid var(--bd);
  padding: 15px;
}

#logo { text-align:center; }
#logo h1 { font-family:'Sora'; margin:0; }
#logo p { font-size:11px; color:var(--t2); }

#userDisplay {
  margin: 15px 0;
  font-size: 14px;
}

.nav-btn {
  display:flex;
  align-items:center;
  padding:10px;
  margin:4px 0;
  border-radius:var(--rs);
  border:none;
  background:none;
  color:var(--tx);
  cursor:pointer;
}
.nav-btn:hover, .nav-btn.active { background: var(--bg3); }

/* Content */
#content {
  flex:1;
  display:flex;
  flex-direction:column;
}

/* Panels */
.panel { display:none; flex:1; overflow:auto; }
.panel.show { display:flex; }

/* Messages */
#messages {
  flex:1;
  padding:10px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  display:flex;
  gap:8px;
}

.msg-user { flex-direction: row-reverse; }

.avatar {
  width:30px;
  height:30px;
  background: var(--bg3);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.msg-bubble {
  max-width:70%;
  padding:8px 12px;
  border-radius:12px;
  background: var(--bg3);
}

.msg-user .msg-bubble {
  background: var(--accent);
}

/* Input */
#inputArea {
  display:flex;
  padding:10px;
  border-top:1px solid var(--bd);
}

#chatInput {
  flex:1;
  resize:none;
  padding:8px;
}

#sendBtn {
  margin-left:10px;
}

/* Modals */
#authModal, #botModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#authModal > div,
#botModal > div {
  background:white;
  padding:20px;
  border-radius:8px;
  width:90%;
  max-width:400px;
}
</style>
</head>

<body>

<!-- Auth buttons -->
<div id="authContainer">
  <button onclick="signInWithGoogle()">Sign in with Google</button>
  <button onclick="showSignIn()">Sign in</button>
  <button onclick="showSignUp()">Sign Up</button>
</div>

<button id="signOutBtn" style="display:none" onclick="signOut()">Sign Out</button>

<!-- AUTH MODAL -->
<div id="authModal">
  <div>
    <h3 id="authTitle">Sign In</h3>
    <label>Email:</label>
    <input type="email" id="authEmail">
    <label>Password:</label>
    <input type="password" id="authPass">

    <div style="margin-top:10px; display:flex; justify-content:flex-end; gap:10px;">
      <button onclick="closeAuth()">Cancel</button>
      <button id="authAction" onclick="doAuth('signin')">Sign In</button>
    </div>
  </div>
</div>

<!-- BOT MODAL -->
<div
