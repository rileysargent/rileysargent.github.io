<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperAI</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
:root {
  --accent: #6f5af0;
  --bg: #0b0b10;
  --bg2: #14141b;
  --bg3: #1c1c24;
  --glass: rgba(255,255,255,0.05);
  --tx: #f1f1f8;
  --t2: #7f8090;
  --r: 14px;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  height: 100vh;
  display: flex;
}

/* AUTH */
#authContainer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

#googleBtn {
  padding: 14px 24px;
  background: white;
  color: #333;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
  width: 100%;
  height: 100%;
}

/* SIDEBAR */
#sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--glass);
  padding: 18px;
  display: flex;
  flex-direction: column;
}

#nav button {
  width: 100%;
  padding: 10px;
  margin: 4px 0;
  border-radius: var(--r);
  border: none;
  background: transparent;
  color: var(--tx);
  cursor: pointer;
}

#nav button.active,
#nav button:hover {
  background: var(--bg3);
}

/* BOTS */
#bot-list button {
  width: 100%;
  text-align: left;
  padding: 8px;
  margin: 4px 0;
  border-radius: var(--r);
  border: none;
  background: var(--bg3);
  color: white;
  cursor: pointer;
}

/* MODAL */
#botModal {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  align-items:center;
  justify-content:center;
}

#botModal > div {
  background:#14141b;
  padding:24px;
  border-radius:14px;
  width:90%;
  max-width:420px;
  color:#f1f1f8;
}

#iconChooser button,
#colorChooser button {
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  cursor:pointer;
}

/* CHAT */
#messages {
  flex:1;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.msg {
  display:flex;
  gap:8px;
}

.msg-user { flex-direction: row-reverse; }

.avatar {
  width:32px;
  height:32px;
  border-radius:50%;
  background: var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
}

.msg-bubble {
  max-width:70%;
  padding:8px 12px;
  border-radius:12px;
  background: var(--bg3);
}

.msg-user .msg-bubble {
  background: var(--accent);
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="authContainer">
  <button id="googleBtn" onclick="signInWithGoogle()">Continue with Google</button>
</div>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <h1>HyperAI</h1>
    <p style="font-size:11px; color:var(--t2)">AI workspace</p>

    <div id="nav">
      <button class="active" onclick="showPanel('discover')">Discover</button>
      <button onclick="showPanel('chat')">Chat</button>
    </div>

    <button style="margin-top:12px" onclick="openBotModal()">Create Bot</button>

    <div id="bot-list" style="margin-top:12px; font-size:13px; color:var(--t2)">
      No bots yet
    </div>

    <div id="subscription" style="margin-top:20px; font-size:12px;">
      Subscription: <span id="subStatus">Free</span>
    </div>
  </div>

  <div id="content">
    <div id="panel-discover" class="panel show" style="flex:1; display:flex; align-items:center; justify-content:center;">
      <div>Discover bots</div>
    </div>

    <div id="panel-chat" class="panel" style="flex:1; flex-direction:column;">
      <div id="messages"></div>
    </div>
  </div>
</div>

<!-- BOT MODAL -->
<div id="botModal">
  <div>
    <h3>Create Bot</h3>

    <label>Name</label>
    <input id="botName" type="text" style="width:100%; padding:8px; border-radius:8px; border:none;">

    <label>System Prompt</label>
    <textarea id="botSys" style="width:100%; height:60px;"></textarea>

    <label>Starting Message</label>
    <textarea id="botStart" style="width:100%; height:60px;"></textarea>

    <label>Icon</label>
    <div id="iconChooser">
      <button onclick="selectIcon('🤖')">🤖</button>
      <button onclick="selectIcon('🧠')">🧠</button>
      <button onclick="selectIcon('✨')">✨</button>
      <button onclick="selectIcon('👾')">👾</button>
    </div>
    <div id="selectedIcon">Selected: 🤖</div>

    <label>Color</label>
    <div id="colorChooser">
      <button style="background:#6f5af0" onclick="selectColor('#6f5af0')"></button>
      <button style="background:#ff6b6b" onclick="selectColor('#ff6b6b')"></button>
      <button style="background:#2ecc71" onclick="selectColor('#2ecc71')"></button>
      <button style="background:#3498db" onclick="selectColor('#3498db')"></button>
    </div>
    <div id="selectedColor">Color: #6f5af0</div>

    <div style="margin-top:10px; display:flex; justify-content:flex-end; gap:10px;">
      <button onclick="closeBotModal()">Cancel</button>
      <button onclick="createBot()">Create</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAF8YTlX0gmn51wD81I6yqJIi5evehXKfo",
  authDomain: "hyperai-r.firebaseapp.com",
  databaseURL: "https://hyperai-r-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hyperai-r",
  storageBucket: "hyperai-r.firebasestorage.app",
  messagingSenderId: "129777724896",
  appId: "1:129777724896:web:6ceda58ba7103334e78f85",
  measurementId: "G-T5TVDRDHBN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let activeBot = null;
let selectedIcon = '🤖';
let selectedColor = '#6f5af0';

/* AUTH */
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(console.error);
}

auth.onAuthStateChanged(async user => {
  if(user) {
    currentUser = user;
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('app').style.display = 'flex';

    await loadSubscription();
    loadBots();
  } else {
    currentUser = null;
    document.getElementById('authContainer').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

/* SUBSCRIPTIONS */
async function loadSubscription() {
  if(!currentUser) return;
  const doc = await db.collection('subscriptions').doc(currentUser.uid).get();
  document.getElementById('subStatus').innerText =
    doc.exists ? doc.data().tier : 'Free';
}

/* BOTS */
async function loadBots() {
  if(!currentUser) return;
  const snap = await db.collection('bots')
    .doc(currentUser.uid)
    .collection('list')
    .get();

  const list = document.getElementById('bot-list');
  list.innerHTML = '';

  snap.forEach(doc => {
    const b = doc.data();
    const btn = document.createElement('button');
    btn.innerHTML = `${b.icon} ${b.name}`;
    btn.style.color = b.color;
    btn.onclick = () => openChat(b);
    list.appendChild(btn);
  });

  if(snap.empty) list.innerHTML = 'No bots yet';
}

function openBotModal() {
  document.getElementById('botModal').style.display = 'flex';
}

function closeBotModal() {
  document.getElementById('botModal').style.display = 'none';
}

function selectIcon(icon) {
  selectedIcon = icon;
  document.getElementById('selectedIcon').innerText = 'Selected: ' + icon;
}

function selectColor(color) {
  selectedColor = color;
  document.getElementById('selectedColor').innerText = 'Color: ' + color;
}

async function createBot() {
  const name = document.getElementById('botName').value.trim();
  const sys = document.getElementById('botSys').value.trim();
  const start = document.getElementById('botStart').value.trim();

  if(!name || !sys) return;

  const bot = {
    name,
    system: sys,
    startMsg: start,
    icon: selectedIcon,
    color: selectedColor
  };

  await db.collection('bots')
    .doc(currentUser.uid)
    .collection('list')
    .add(bot);

  loadBots();
  closeBotModal();
}

/* CHAT (placeholder) */
function openChat(bot) {
  activeBot = bot;
  document.getElementById('panel-chat').classList.add('show');
}
</script>

</body>
</html>
