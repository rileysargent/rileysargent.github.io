<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gemini AI Dashboard with Full URL from Encrypted Key</title>
<!-- Your CSS styles (full styles from previous code) -->
<style>
  /* ... your styles ... (full style code as previously provided) ... */
  :root {
    --bg-color: #222;
    --text-color: #fff;
    --primary-color: #007bff;
    --secondary-color: #555;
    --accent-color: #4CAF50;
  }
  body.light-theme { --bg-color: #fff; --text-color: #222; --primary-color: #007bff; --secondary-color: #ddd; }
  body.dark-theme { --bg-color: #222; --text-color: #fff; }
  body.extra-dark-theme { --bg-color: #000; --text-color: #ccc; }
  body.blindness-theme { --bg-color: #fff; --text-color: #000; }
  body.blue-theme { --bg-color: #001f3f; --text-color: #fff; }
</style>
</head>
<body>

<!-- UI layout omitted for brevity, same as previous code -->

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  // --- Firebase config ---
  const firebaseConfig = {
    apiKey: "AIzaSyAF8YTlX0gmn51wD81I6yqJIi5evehXKfo",
    authDomain: "hyperai-r.firebaseapp.com",
    databaseURL: "https://hyperai-r-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hyperai-r",
    storageBucket: "hyperai-r.firebasestorage.app",
    messagingSenderId: "129777724896",
    appId: "1:129777724896:web:6ceda58ba7103334e78f85",
    measurementId: "G-T5TVDRDHBN"
  };
  firebase.initializeApp(firebaseConfig);
  const auth=firebase.auth();

  // --- Your encrypted GitHub token ---
  const encryptedToken="tuc_UJTe6nGdH4NnFwc41DhkHfFBFo4N6y0bwulP";

  // --- Decrypt the token ---
  function rot13(str) {
    return str.replace(/[a-zA-Z]/g, c => {
      const cCode = c.charCodeAt(0);
      const base = (cCode>=65 && cCode<=90)?65:97;
      return String.fromCharCode(((cCode - base + 13)%26)+base);
    });
  }
  const githubToken=rot13(atob(encryptedToken)); // Decrypted GitHub token

  // --- Your encrypted Gemini API key (full URL encrypted) ---
  const encryptedGemini="TlZtbkZsTmJFbFdnaWU2WkQyOG5CRUs1ejZ0LVhlRnBPVmdIM2hi";

  // --- Decrypt Gemini API key (assumed to be a full URL) ---
  const geminiFullUrl=rot13(atob(encryptedGemini)); // Your API URL

  // --- Your GitHub info ---
  const owner='rileysargent';
  const repo='rileysargent.github.io';
  const filePath='AIBots.txt';

  // --- Firebase auth ---
  auth.onAuthStateChanged(user=>{
    currentUser=user;
    if (user) {
      document.getElementById('signInContainer').style.display='none';
      document.getElementById('createCharacterPanel').style.display='block';
      loadCharacters();
    } else {
      document.getElementById('signInContainer').style.display='block';
      document.getElementById('createCharacterPanel').style.display='none';
      document.getElementById('charsContainer').innerHTML='';
    }
  });
  document.getElementById('googleSignInBtn').onclick=()=>{
    const provider=new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider);
  }

  // --- Call Gemini API (uses the full URL decrypted from the key) ---
  async function callGemini(prompt) {
    const response=await fetch(geminiFullUrl, {
      method:'POST',
      headers:{
        'Authorization':'Bearer '+geminiApiKey,
        'Content-Type':'application/json'
      },
      body:JSON.stringify({prompt:prompt})
    });
    const data=await response.json();
    return data;
  }

  // --- Your encrypted Gemini API key (full URL encrypted) ---
  // (Assuming the full URL is encrypted similarly)
  const encryptedGemini="TlZtbkZsTmJFbFdnaWU2WkQyOG5CRUs1ejZ0LVhlRnBPVmdIM2hi";

  // --- Decrypt Gemini API key (full URL) ---
  const geminiApiKey=rot13(atob(encryptedGemini));

  // --- Read/write AIBots.txt ---
  async function readAIBots() {
    const url=`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
    const res=await fetch(url,{
      headers: {
        'Authorization':'token '+githubToken,
        'Accept':'application/vnd.github.v3+json'
      }
    });
    if (!res.ok) {
      if (res.status===404) return [];
      console.error('Error fetching:', res.status);
      return [];
    }
    const data=await res.json();
    const content=atob(data.content);
    try {
      return JSON.parse(content);
    } catch(e){ console.error('Invalid JSON'); return []; }
  }
  async function writeAIBots(data) {
    const url=`https://api.github.com/repos/${owner}/${repo}/contents/${filePath}`;
    let sha=null;
    const getResp=await fetch(url,{
      headers: {
        'Authorization':'token '+githubToken,
        'Accept':'application/vnd.github.v3+json'
      }
    });
    if (getResp.ok) {
      const fileData=await getResp.json();
      sha=fileData.sha;
    }
    const contentBase64=btoa(JSON.stringify(data));
    await fetch(url,{
      method:'PUT',
      headers:{
        'Authorization':'token '+githubToken,
        'Accept':'application/vnd.github.v3+json'
      },
      body:JSON.stringify({
        message:'Update AI Bots',
        content:contentBase64,
        sha:sha||undefined
      })
    });
  }

  // --- Load characters ---
  async function loadCharacters() {
    const chars=await readAIBots();
    displayCharacters(chars);
  }
  function displayCharacters(chars) {
    const container=document.getElementById('charsContainer');
    container.innerHTML='';
    if (!chars || chars.length===0) {
      container.innerHTML='<p>No characters. Create one!</p>';
      return;
    }
    chars.forEach((c,i)=>{
      const div=document.createElement('div');
      div.style.width='120px'; div.style.border='1px solid #ccc'; div.style.borderRadius='8px'; div.style.padding='8px'; div.style.cursor='pointer'; div.style.textAlign='center';
      if (c.icon) {
        const img=document.createElement('img');
        img.src='data:image/png;base64,'+c.icon;
        img.style.width='80px'; img.style.height='80px'; img.style.objectFit='cover'; img.style.borderRadius='4px';
        div.appendChild(img);
      }
      const nameDiv=document.createElement('div');
      nameDiv.innerText=c.name;
      nameDiv.style.marginTop='4px';
      div.appendChild(nameDiv);
      div.onclick=()=>{
        document.getElementById('aiName').value=c.name;
        document.getElementById('aiLore').value=c.lore;
        document.getElementById('systemPrompt').value=c.promptSystem;
      }
      container.appendChild(div);
    });
  }

  // --- Save character ---
  document.getElementById('saveAiBtn').onclick=async ()=>{
    const name=document.getElementById('aiName').value.trim();
    const lore=document.getElementById('aiLore').value.trim();
    const promptSystem=document.getElementById('systemPrompt').value.trim();
    if (!name || !promptSystem) { alert('Name and prompt required'); return; }
    const fileInput=document.getElementById('iconUpload');
    let iconBase64='';
    if (fileInput.files && fileInput.files[0]) {
      const reader=new FileReader();
      reader.onload=async ()=>{
        iconBase64=reader.result.split(',')[1];
        await saveCharacter({name, lore, promptSystem, icon: iconBase64});
      }
      reader.readAsDataURL(fileInput.files[0]);
    } else {
      await saveCharacter({name, lore, promptSystem, icon: ''});
    }
  }
  async function saveCharacter(character) {
    const chars=await readAIBots();
    chars.push(character);
    await writeAIBots(chars);
    alert('Character saved!');
    loadCharacters();
  }

  // --- Theme setup ---
  const themes=['light-theme','dark-theme','extra-dark-theme','blindness-theme','blue-theme'];
  function setTheme(t) {
    themes.forEach(th=>document.body.classList.remove(th));
    document.body.classList.add(t);
    localStorage.setItem('theme',t);
  }
  const savedTheme=localStorage.getItem('theme')||'dark-theme';
  setTheme(savedTheme);

  document.querySelectorAll('.theme-choice').forEach(btn=>{
    btn.onclick=()=>{
      const t=btn.getAttribute('data-theme');
      setTheme(t);
      document.getElementById('themeSelector').style.display='none';
    }
  });

  // --- Navigation ---
  document.querySelectorAll('.nav-item').forEach(n=>{
    n.onclick=()=>{
      document.querySelector('.nav-item.active')?.classList.remove('active');
      n.classList.add('active');
      document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
      document.getElementById(n.dataset.section).classList.add('active');
    }
  });
  // Sign out
  document.getElementById('signOutBtn').onclick=()=>auth.signOut();
  // Settings modal
  document.getElementById('openSettings').onclick=()=>{ document.getElementById('settingsModal').style.display='flex'; }
  document.getElementById('closeSettings').onclick=()=>{ document.getElementById('settingsModal').style.display='none'; }
  document.getElementById('themeBtn').onclick=()=>{ document.getElementById('themeSelector').style.display='flex'; }
  document.getElementById('closeThemeSelector').onclick=()=>{ document.getElementById('themeSelector').style.display='none'; }

  // Load models
  function loadModels() {
    document.getElementById('discoverResults').innerHTML='<p>Gemini Model A, Model B, Model C</p>';
  }
  document.querySelector('.nav-item[data-section="discover"]').onclick=loadModels;

  // Load chats
  function loadChats() {
    document.getElementById('chatList').innerHTML='<p>No chats yet. Start a conversation!</p>';
  }
  document.querySelector('.nav-item[data-section="chats"]').onclick=loadChats;

  // --- Initial load ---
  loadModels();

</script>
</body>
</html>
