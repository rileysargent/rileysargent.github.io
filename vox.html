<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperAI</title>
<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#3b82f6;
  --text:#f1f5f9;
  --muted:#94a3b8;
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:var(--text);
  display:flex;
  height:100vh;
  overflow:hidden;
}
.sidebar{
  width:230px;
  background:rgba(30,41,59,0.7);
  backdrop-filter:blur(20px);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
  border-right:1px solid rgba(255,255,255,0.05);
}
.nav-item{
  padding:12px;
  border-radius:var(--radius);
  cursor:pointer;
  color:var(--muted);
}
.nav-item:hover{background:rgba(255,255,255,0.05);color:white}
.nav-item.active{background:var(--accent);color:white}
.main{flex:1;display:flex;flex-direction:column}
.header{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.account-icon{
  width:42px;height:42px;border-radius:50%;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-weight:600;
}
.account-menu{
  position:absolute;
  top:55px;
  right:0;
  background:var(--card);
  border-radius:var(--radius);
  display:none;
  flex-direction:column;
  min-width:150px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.account-menu.show{display:flex}
.account-menu div{padding:12px;cursor:pointer}
.account-menu div:hover{background:rgba(255,255,255,0.05)}

.content{flex:1;padding:30px;overflow-y:auto}
.card{
  background:var(--card);
  padding:25px;
  border-radius:var(--radius);
  margin-bottom:20px;
}
input,textarea,select{
  width:100%;
  padding:12px;
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,0.05);
  background:#0f172a;
  color:white;
  margin-top:10px;
}
button{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:var(--radius);
  background:var(--accent);
  color:white;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
}
.bot-card{
  background:var(--card);
  border-radius:16px;
  padding:12px;
  text-align:center;
}
.bot-card img{
  width:64px;height:64px;border-radius:12px;object-fit:cover;
}
section{display:none}
section.active{display:block}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen" style="position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;z-index:9999;">
  <div class="card" style="width:400px;max-width:90%">
    <h2>Sign In</h2>
    <div id="g_id_onload"
         data-client_id="129777724896-lmvaotcc6oudll99j642mpvd26r21lsj.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin" data-type="standard"></div>
  </div>
</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>

<div class="sidebar">
  <h2>HyperAI</h2>
  <div class="nav-item active" data-section="home">Home</div>
  <div class="nav-item" data-section="discover">Discover</div>
  <div class="nav-item" data-section="create">Create AI</div>
  <div class="nav-item" data-section="profile">Profile</div>
</div>

<div class="main">
  <div class="header">
    <div>Dashboard</div>
    <div style="position:relative">
      <div class="account-icon" id="accountBtn">R</div>
      <div class="account-menu" id="accountMenu">
        <div id="refreshBtn">Refresh</div>
        <div id="settingsBtn">Settings</div>
        <div id="logoutBtn">Sign Out</div>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- HOME -->
    <section id="home" class="active">
      <div class="card">
        <h2>Welcome</h2>
      </div>
      <div class="grid" id="botGrid"></div>
    </section>

    <!-- DISCOVER -->
    <section id="discover">
      <div class="card">
        <h2>Discover</h2>
        <h3>New</h3>
        <div class="grid" id="discoverNew"></div>

        <h3 style="margin-top:20px">Recommended</h3>
        <div class="grid" id="discoverRecommended"></div>
      </div>
    </section>

    <!-- CREATE -->
    <section id="create">
      <div class="card">
        <h2>Create Character</h2>
        <input id="charName" placeholder="Name (24)">
        <textarea id="charLore" placeholder="Lore (500)"></textarea>
        <textarea id="charPrompt" placeholder="Prompt (1000)"></textarea>
        <select id="charCategory">
          <option value="">Category</option>
          <option>RPG</option>
          <option>Assistant</option>
          <option>Art</option>
          <option>Other</option>
        </select>
        <input id="charImage" type="file" accept="image/*">
        <button onclick="saveBot()">Save</button>
      </div>
    </section>

    <!-- PROFILE -->
    <section id="profile">
      <div class="card">
        <h2>Profile</h2>
        <input id="profileName" placeholder="Name">
        <textarea id="profileBio" placeholder="Bio"></textarea>
        <button onclick="saveProfile()">Save Profile</button>
      </div>
    </section>

  </div>
</div>

<script>
let accessToken=null;
let lastGlobalSave=0;
const GLOBAL_COOLDOWN_MS=2000;
const USER_COOLDOWN_MS=60000;
const DRIVE_FILE="AIBots.json";
const LOCAL_USER="HyperAI_User";
const LOCAL_CHATS="HyperAI_Chats";

// ==============================
// AUTH
// ==============================
function handleCredentialResponse(response){
  accessToken=response.credential;
  document.getElementById("authScreen").style.display="none";

  const user=loadLocalUser() || {id:accessToken,name:"User",bio:""};
  saveLocalUser(user);

  loadProfile();
  loadBots();
}

// ==============================
// LOCAL STORAGE
// ==============================
function loadLocalUser(){
  const data=localStorage.getItem(LOCAL_USER);
  return data?JSON.parse(data):null;
}

function saveLocalUser(user){
  localStorage.setItem(LOCAL_USER,JSON.stringify(user));
}

function loadChats(){
  const data=localStorage.getItem(LOCAL_CHATS);
  return data?JSON.parse(data):{};
}

function saveChats(chats){
  localStorage.setItem(LOCAL_CHATS,JSON.stringify(chats));
}

// ==============================
// DRIVE HELPERS
// ==============================
async function driveHeaders(){
  return {Authorization:`Bearer ${accessToken}`};
}

async function listDriveFiles(){
  const res=await fetch("https://www.googleapis.com/drive/v3/files",{headers:await driveHeaders()});
  return await res.json();
}

async function readDriveFile(id){
  const res=await fetch(`https://www.googleapis.com/drive/v3/files/${id}?alt=media`,{headers:await driveHeaders()});
  return await res.text();
}

async function writeDriveFile(name,data){
  const metadata={name,mimeType:"application/json"};
  const form=new FormData();
  form.append("metadata",new Blob([JSON.stringify(metadata)],{type:"application/json"}));
  form.append("file",new Blob([JSON.stringify(data)],{type:"application/json"}));

  return await fetch(
    "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
    {method:"POST",headers:await driveHeaders(),body:form}
  );
}

// ==============================
// IMAGE RESIZE
// ==============================
async function resizeTo64(file){
  const img=new Image();
  img.src=URL.createObjectURL(file);
  await img.decode();

  const canvas=document.createElement("canvas");
  canvas.width=64;
  canvas.height=64;

  const ctx=canvas.getContext("2d");
  ctx.drawImage(img,0,0,64,64);

  return canvas.toDataURL("image/png");
}

// ==============================
// PROFILE
// ==============================
function loadProfile(){
  const user=loadLocalUser();
  if(!user) return;
  document.getElementById("profileName").value=user.name||"";
  document.getElementById("profileBio").value=user.bio||"";
}

async function saveProfile(){
  const name=document.getElementById("profileName").value.trim();
  const bio=document.getElementById("profileBio").value.trim();

  const user={id:accessToken,name,bio};
  saveLocalUser(user);

  const files=await listDriveFiles();
  let users=[];
  const existing=files.files?.find(f=>f.name==="Users.json");

  if(existing){
    const data=await readDriveFile(existing.id);
    try{users=JSON.parse(data);}catch{}
  }

  const idx=users.findIndex(u=>u.id===user.id);
  if(idx>=0) users[idx]=user;
  else users.push(user);

  await writeDriveFile("Users.json",users);
}

// ==============================
// STORAGE
// ==============================
function generateId(){
  return Math.random().toString(36).substring(2,7);
}

async function loadBots(){
  if(!accessToken) return;

  const files=await listDriveFiles();
  const botFile=files.files?.find(f=>f.name===DRIVE_FILE);

  let bots=[];
  if(botFile){
    const data=await readDriveFile(botFile.id);
    try{bots=JSON.parse(data);}catch{}
  }

  displayGrid(bots);
  renderDiscover(bots);
}

function displayGrid(bots){
  const grid=document.getElementById("botGrid");
  grid.innerHTML="";

  if(!bots.length){
    grid.innerHTML="<p>No bots yet</p>";
    return;
  }

  bots.forEach(renderCard);
}

function renderCard(b){
  const card=document.createElement("div");
  card.className="bot-card";

  card.innerHTML=`
    ${b.imagePath?`<img src="${b.imagePath}">`:""}
    <h3>${b.name}</h3>
    <p>${b.lore||""}</p>
    <small>${b.category||""}</small>
    <div>Likes: ${b.likes||0}</div>
    <button onclick="likeBot('${b.id}')">Like</button>
    <div id="comments-${b.id}">${renderComments(b)}</div>
    <input id="comment-${b.id}" placeholder="Comment">
    <button onclick="addComment('${b.id}')">Comment</button>
  `;

  document.getElementById("botGrid").appendChild(card);
}

function renderComments(b){
  return (b.comments||[]).map(c=>`<p>${c.user}: ${c.text}</p>`).join("");
}

// SAVE BOT
async function saveBot(){
  if(!accessToken) return alert("Sign in first");

  const userId=accessToken.substring(0,10);
  if(!canSaveGlobal()) return alert("Please wait");
  if(!canUserSave(userId)) return alert("One bot per minute");

  const name=document.getElementById("charName").value.trim();
  const lore=document.getElementById("charLore").value.trim();
  const prompt=document.getElementById("charPrompt").value.trim();
  const category=document.getElementById("charCategory").value;
  const file=document.getElementById("charImage").files[0];

  if(!name||!prompt) return alert("Name and Prompt required");
  if(name.length>24) return alert("Name max 24");
  if(lore.length>500) return alert("Lore max 500");
  if(prompt.length>1000) return alert("Prompt max 1000");

  let imagePath="";
  if(file){
    const base64=await resizeTo64(file);
    const upload=await writeDriveFile(`${generateId()}.png`,base64);
    const result=await upload.json();
    if(result.id) imagePath=`https://drive.google.com/uc?id=${result.id}`;
  }

  const files=await listDriveFiles();
  let bots=[];
  const existing=files.files?.find(f=>f.name===DRIVE_FILE);

  if(existing){
    const data=await readDriveFile(existing.id);
    try{bots=JSON.parse(data);}catch{}
  }

  bots.push({
    id:generateId(),
    owner:accessToken,
    name,lore,prompt,category,
    imagePath,
    likes:0,
    comments:[],
    created:Date.now()
  });

  await writeDriveFile(DRIVE_FILE,bots);
  loadBots();
}

// LIKE
async function likeBot(id){
  const files=await listDriveFiles();
  const file=files.files?.find(f=>f.name===DRIVE_FILE);
  if(!file) return;

  const data=await readDriveFile(file.id);
  let bots=[];
  try{bots=JSON.parse(data);}catch{}

  const bot=bots.find(b=>b.id===id);
  if(bot) bot.likes=(bot.likes||0)+1;

  await writeDriveFile(DRIVE_FILE,bots);
  loadBots();
}

// COMMENTS
async function addComment(id){
  const text=document.getElementById(`comment-${id}`).value.trim();
  if(!text) return;

  const files=await listDriveFiles();
  const file=files.files?.find(f=>f.name===DRIVE_FILE);
  if(!file) return;

  const data=await readDriveFile(file.id);
  let bots=[];
  try{bots=JSON.parse(data);}catch{}

  const bot=bots.find(b=>b.id===id);
  if(bot){
    bot.comments=bot.comments||[];
    bot.comments.push({user:loadLocalUser()?.name||"User",text,time:Date.now()});
  }

  await writeDriveFile(DRIVE_FILE,bots);
  loadBots();
}

// DISCOVER
function discoverNew(bots){
  return [...bots].sort((a,b)=>(b.created||0)-(a.created||0)).slice(0,10);
}

function discoverRecommended(bots){
  return [...bots].sort(()=>Math.random()-0.5).slice(0,10);
}

function cardHtml(b){
  return `
    <div class="bot-card">
      ${b.imagePath?`<img src="${b.imagePath}">`:""}
      <h3>${b.name}</h3>
      <p>${b.lore||""}</p>
      <small>${b.category||""}</small>
    </div>
  `;
}

function renderDiscover(bots){
  document.getElementById("discoverNew").innerHTML =
    discoverNew(bots).map(cardHtml).join("");

  document.getElementById("discoverRecommended").innerHTML =
    discoverRecommended(bots).map(cardHtml).join("");
}

// CHAT (localStorage)
function addMessage(chatId, from, text){
  const chats=loadChats();
  chats[chatId]=chats[chatId]||[];
  chats[chatId].push({from,text,time:Date.now()});
  saveChats(chats);
}

// NAV
document.querySelectorAll(".nav-item").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelector(".nav-item.active")?.classList.remove("active");
    btn.classList.add("active");

    document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
    document.getElementById(btn.dataset.section).classList.add("active");
  };
});

// ACCOUNT MENU
const accountBtn=document.getElementById("accountBtn");
const accountMenu=document.getElementById("accountMenu");

accountBtn.onclick=()=>accountMenu.classList.toggle("show");

document.getElementById("refreshBtn").onclick=()=>loadBots();
document.getElementById("settingsBtn").onclick=()=>alert("Settings TBD");
document.getElementById("logoutBtn").onclick=()=>{
  accessToken=null;
  document.getElementById("authScreen").style.display="flex";
};
</script>

</body>
</html>
