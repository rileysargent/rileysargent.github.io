<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HyperAI Dashboard</title>
<style>:root{--bg:#222;--text:#fff;--primary:#007bff;--secondary:#555;--accent:#4CAF50}body{font-family:sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;transition:.3s}
.header{display:flex;justify-content:space-between;padding:10px 20px;background:var(--secondary);box-shadow:0 2px 4px rgba(0,0,0,.2)}
.header .brand{font-weight:700;font-size:1.2em;color:#fff}
.account{position:relative;cursor:pointer}
.account-icon{width:40px;height:40px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2em}
.account-menu{position:absolute;top:50px;right:0;display:none;background:#555;border-radius:8px;overflow:hidden}
.account-menu.show{display:flex;flex-direction:column}
.account-menu div{padding:10px 15px;cursor:pointer}
.account-menu div:hover{background:var(--primary);color:#fff}
.main{display:flex;flex:1}
.sidebar{width:200px;background:var(--secondary);padding:10px 0}
.sidebar h3{color:#fff;padding:0 10px}
.nav-item{padding:10px 15px;margin:5px 0;border-radius:4px;font-weight:600;cursor:pointer}
.nav-item:hover,.nav-item.active{background:var(--primary);color:#fff}
.content{flex:1;padding:10px 20px;overflow-y:auto}
section{display:none}
section.active{display:block}
input[type=text],textarea,input[type=file]{width:100%;margin-top:5px;padding:8px;border-radius:4px;border:1px solid #ccc}
button{margin-top:10px;padding:8px 12px;border:none;border-radius:4px;cursor:pointer}
button#saveBtn{background:#28a745;color:#fff}
button#saveBtn:hover{background:#218838}
</style></head><body>

<div class="header">
  <div class="brand">HyperAI Dashboard</div>
  <div class="account" id="accountBtn">
    <div class="account-icon" title="Account Menu">🌟</div>
    <div class="account-menu" id="accountMenu">
      <div id="profileBtn">Profile</div>
      <div id="settingsBtn">Settings</div>
      <div id="signOutBtn">Sign Out</div>
    </div>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <h3>Navigate</h3>
    <div class="nav-item active" data-section="dashboard">Home</div>
    <div class="nav-item" data-section="discover">Discover</div>
    <div class="nav-item" data-section="create">Create AI</div>
    <div class="nav-item" data-section="chats">Chats</div>
  </div>
  <div class="content" id="contentArea">
    <section id="dashboard" class="active">
      <h2>Welcome to HyperAI</h2>
      <p>Create, discover, and chat with models.</p>
    </section>
    <section id="discover">
      <h2>Discover Models</h2>
      <input id="searchModels" placeholder="Search models..."/>
      <div id="discoverResults">Loading...</div>
    </section>
    <section id="create">
      <h2>Create Character</h2>
      <input id="charName" placeholder="Name"/>
      <textarea id="charLore" placeholder="Lore"></textarea>
      <textarea id="charPrompt" placeholder="System Prompt">You are Hyper, an AI assistant.</textarea>
      <input id="charIcon" type="file" accept="image/png"/>
      <button id="saveBtn">Save</button>
    </section>
    <section id="chats">
      <h2>Chats</h2>
      <input id="searchChats" placeholder="Search chats..."/>
      <div id="chatList">No chats yet</div>
      <button id="newChatBtn">New Chat</button>
    </section>
  </div>
</div>

<!-- Modal overlays omitted for brevity, style inline -->
<div id="settingsModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:999;">
  <div style="background:#fff;padding:20px;border-radius:8px;width:80%;max-width:300px;text-align:center;">
    <h3>Settings</h3>
    <button id="themeBtn">Change Theme</button>
    <button id="closeSettings">Close</button>
  </div>
</div>
<div id="themeSelector" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;">
  <div style="background:#fff;padding:20px;border-radius:8px;width:80%;max-width:300px;text-align:center;">
    <h3>Select Theme</h3>
    <button data-theme="light-theme">Light</button>
    <button data-theme="dark-theme">Dark</button>
    <button data-theme="extra-dark-theme">Extra Dark</button>
    <button data-theme="blindness-theme">Blindness</button>
    <button data-theme="blue-theme">Blue</button>
    <br/><br/>
    <button id="cancelTheme">Cancel</button>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// Firebase init
const firebaseConfig={apiKey:"AIzaSyAF8YTlX0gmn51wD81I6yqJIi5evehXKfo",authDomain:"hyperai-r.firebaseapp.com",projectId:"hyperai-r",storageBucket:"hyperai-r.firebasestorage.app",messagingSenderId:"129777724896",appId:"1:129777724896:web:6ceda58ba7103334e78f85"};
firebase.initializeApp(firebaseConfig);
const auth=firebase.auth();

// --- Sign-in/out ---
document.getElementById('profileBtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
document.getElementById('signOutBtn').onclick=()=>auth.signOut();
auth.onAuthStateChanged(u=>{
  document.getElementById('signInContainer').style.display=u?'none':'block';
  document.getElementById('create').style.display=u?'block':'none';
});

// --- Decrypt keys ---
const encToken='tuc_UJTe6nGdH4NnFwc41DhkHfFBFo4N6y0bwulP'; // rot13
const encGemini='TlZtbkZsTmJFbFdnaWU2WkQyOG5CRUs1ejZ0LVhlRnBPVmdIM2hi'; // base64+rot13
function rot13(s){return s.replace(/[a-zA-Z]/g,c=>{const cCode=c.charCodeAt(0),base=(cCode>=65&&cCode<=90)?65:97;return String.fromCharCode(((cCode-base+13)%26)+base);});}
const gToken=rot13(encToken);
const gUrl=rot13(atob(encGemini));
const gApiKey=rot13(atob(encGemini)); // assuming same

// --- API call ---
async function callGemini(prompt){
  const res=await fetch(gUrl,{
    method:'POST',
    headers:{
      'Authorization':'Bearer '+gApiKey,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({prompt})
  });
  return await res.json();
}

// --- Storage ---
const owner='rileysargent'; const repo='rileysargent.github.io'; const file='AIBots.txt';
async function getBots(){
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,{
    headers:{'Authorization':'token '+gToken}
  });
  if(!r.ok)return[];
  const d=await r.json();
  return JSON.parse(atob(d.content));
}
async function saveBots(data){
  const r=await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,{
    method:'PUT',
    headers:{'Authorization':'token '+gToken},
    body:JSON.stringify({
      message:'update',
      content:btoa(JSON.stringify(data)),
      sha:((await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${file}`,{
        headers:{'Authorization':'token '+gToken}
      })).json().then(j=>j.sha))
    })
  });
}

// --- Load & display ---
async function loadChars(){const c=await getBots();displayChars(c);}
function displayChars(c){const container=document.getElementById('charsContainer');container.innerHTML='';if(!c.length){container.innerHTML='<p>No characters</p>';return;}c.forEach(ch=>{
  const d=document.createElement('div');
  d.style.width='100px';d.style.border='1px solid #ccc';d.style.borderRadius='4px';d.style.padding='5px';d.style.cursor='pointer';d.style.textAlign='center';
  if(ch.icon){const img=document.createElement('img');img.src='data:image/png;base64,'+ch.icon;img.style.width='80px';img.style.borderRadius='4px';d.appendChild(img);}
  const n=document.createElement('div');n.innerText=ch.name;n.style.marginTop='4px';d.appendChild(n);
  d.onclick=()=>{document.getElementById('charName').value=ch.name;document.getElementById('charLore').value=ch.lore;document.getElementById('charPrompt').value=ch.promptSystem;}
  document.getElementById('charsContainer').appendChild(d);
});}

// --- Save character ---
document.getElementById('saveBtn').onclick=async ()=>{
  const name=document.getElementById('charName').value.trim();
  const lore=document.getElementById('charLore').value.trim();
  const prompt=document.getElementById('charPrompt').value.trim();
  if(!name||!prompt){alert('Name & Prompt required');return;}
  const file=document.getElementById('charIcon');
  let icon='';
  if(file.files[0]){
    const reader=new FileReader();
    reader.onload=async()=>{icon=reader.result.split(',')[1]; await saveChar({name,lore,promptSystem:prompt,icon});loadChars();}
    reader.readAsDataURL(file.files[0]);
  }else{await saveChar({name,lore,promptSystem:prompt,icon});loadChars();}
}
async function saveChar(c){const arr=await getBots();arr.push(c);await saveBots(arr); alert('Saved');}

// --- Theme ---
const themes=['light-theme','dark-theme','extra-dark-theme','blindness-theme','blue-theme'];
function setTheme(t){themes.forEach(c=>document.body.classList.remove(c));document.body.classList.add(t);localStorage.setItem('theme',t);}
setTheme(localStorage.getItem('theme')||'dark-theme');
document.querySelectorAll('.theme-choice').forEach(b=>b.onclick=()=>{setTheme(b.dataset.theme);document.getElementById('themeSelector').style.display='none';});

// --- UI ---
document.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>{document.querySelector('.nav-item.active')?.classList.remove('active');n.classList.add('active');document.querySelectorAll('section').forEach(s=>s.classList.remove('active'));document.getElementById(n.dataset.section).classList.add('active');});
document.getElementById('profileBtn').onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
document.getElementById('signOutBtn').onclick=()=>auth.signOut();
document.getElementById('openSettings').onclick=()=>{document.getElementById('settingsModal').style.display='flex';}
document.getElementById('closeSettings').onclick=()=>{document.getElementById('settingsModal').style.display='none';}
document.getElementById('themeBtn').onclick=()=>{document.getElementById('themeSelector').style.display='flex';}
document.getElementById('closeThemeSelector').onclick=()=>{document.getElementById('themeSelector').style.display='none';}
document.querySelector('.nav-item[data-section="discover"]').onclick=()=>{document.getElementById('discoverResults').innerHTML='<p>Model A, B, C</p>';}
document.querySelector('.nav-item[data-section="chats"]').onclick=()=>{document.getElementById('chatList').innerHTML='<p>No chats</p>';}
loadChars();

</script></body></html>
