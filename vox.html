<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HyperAI</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

<style>
:root {
  --accent: #6f5af0;
  --bg: #0b0b10;
  --bg2: #14141b;
  --bg3: #1c1c24;
  --glass: rgba(255,255,255,0.05);
  --tx: #f1f1f8;
  --t2: #7f8090;
  --r: 14px;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  height: 100vh;
  display: flex;
}

/* AUTH */
#authContainer {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

#googleBtn {
  padding: 14px 24px;
  background: white;
  color: #333;
  border-radius: 999px;
  border: none;
  font-weight: 600;
  cursor: pointer;
}

/* SIGN OUT */
#signOutBtn {
  position: absolute;
  top: 14px;
  right: 14px;
  padding: 8px 14px;
  border-radius: 999px;
  border: none;
  background: #444;
  color: white;
  cursor: pointer;
  z-index: 99;
}

/* APP LAYOUT */
#app {
  display: none;
  width: 100%;
  height: 100%;
}

/* SIDEBAR */
#sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--glass);
  padding: 18px;
  display: flex;
  flex-direction: column;
}

#sidebar h1 {
  margin: 0;
  font-family: 'Sora';
}

#nav button {
  width: 100%;
  padding: 10px;
  margin: 4px 0;
  border-radius: var(--r);
  border: none;
  background: transparent;
  color: var(--tx);
  cursor: pointer;
}

#nav button.active,
#nav button:hover {
  background: var(--bg3);
}

/* CONTENT */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* TOPBAR */
#topbar {
  padding: 14px;
  border-bottom: 1px solid var(--glass);
}

/* PANELS */
.panel {
  display: none;
  flex: 1;
  overflow: auto;
}

.panel.show {
  display: flex;
}

/* DISCOVER */
#discover {
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--t2);
}

/* CHAT */
#messages {
  flex: 1;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  display: flex;
  gap: 8px;
}

.msg-user {
  flex-direction: row-reverse;
}

.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
}

.msg-bubble {
  max-width: 70%;
  padding: 8px 12px;
  border-radius: 12px;
  background: var(--bg3);
}

.msg-user .msg-bubble {
  background: var(--accent);
}

/* INPUT */
#inputArea {
  display: flex;
  padding: 10px;
  border-top: 1px solid var(--glass);
}

#chatInput {
  flex: 1;
  resize: none;
  padding: 8px;
  border-radius: var(--r);
  border: none;
}

#sendBtn {
  margin-left: 10px;
  border-radius: var(--r);
  border: none;
  background: var(--accent);
  color: white;
  padding: 8px 14px;

  #iconChooser button {
  width:36px;
  height:36px;
  border-radius:50%;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:#1c1c24;
}

#colorChooser button {
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  cursor:pointer;
}

#createBotBtn {
  background: var(--accent);
  color:white;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- AUTH SCREEN -->
<div id="authContainer">
  <button id="googleBtn" onclick="signInWithGoogle()">Continue with Google</button>
</div>

<button id="signOutBtn" style="display:none" onclick="signOut()">Sign Out</button>

<!-- APP -->
<div id="app">
  <div id="sidebar">
    <h1>HyperAI</h1>
    <p style="font-size:11px; color:var(--t2)">AI workspace</p>

    <div id="nav">
      <button class="active" onclick="showPanel('discover')">Discover</button>
      <button onclick="showPanel('chat')">Chat</button>
    </div>

    <button style="margin-top:12px" onclick="openBotModal()">Create Bot</button>

    <div id="bot-list" style="margin-top:12px; font-size:13px; color:var(--t2)">
      No bots yet
    </div>
  </div>

  <div id="content">
    <div id="topbar">
      <h2 id="tb-title">Discover</h2>
      <p id="tb-sub" style="margin:0; font-size:11px; color:var(--t2)">Find AI bots</p>
    </div>

    <div id="panel-discover" class="panel show">
      <div style="margin:auto; text-align:center; color:var(--t2)">
        <div style="font-size:48px">🤖</div>
        <div>No bots yet. Create one.</div>
      </div>
    </div>

    <div id="panel-chat" class="panel" style="flex-direction:column">
      <div id="messages"></div>
      <div id="inputArea">
        <textarea id="chatInput"></textarea>
        <button id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>
</div>

<!-- BOT MODAL -->
<!-- CREATE BOT MODAL -->
<div id="botModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;">
  <div style="
    background:#14141b;
    padding:24px;
    border-radius:14px;
    width:90%;
    max-width:420px;
    color:#f1f1f8;
  ">
    <h3 style="margin-top:0;">Create Bot</h3>

    <label>Name</label>
    <input id="botName" type="text" style="width:100%; padding:8px; border-radius:8px; border:none; margin-bottom:10px;">

    <label>System Prompt</label>
    <textarea id="botSys" style="width:100%; height:60px; border-radius:8px; border:none; margin-bottom:10px;"></textarea>

    <label>Starting Message</label>
    <textarea id="botStart" style="width:100%; height:60px; border-radius:8px; border:none; margin-bottom:10px;"></textarea>

    <!-- ICON CHOOSER -->
    <label>Icon</label>
    <div id="iconChooser" style="display:flex; gap:10px; margin:8px 0 14px;">
      <button onclick="selectIcon('🤖')">🤖</button>
      <button onclick="selectIcon('🧠')">🧠</button>
      <button onclick="selectIcon('✨')">✨</button>
      <button onclick="selectIcon('👾')">👾</button>
      <button onclick="selectIcon('⚙️')">⚙️</button>
    </div>
    <div id="selectedIcon" style="margin-bottom:10px;">Selected: 🤖</div>

    <!-- COLOR PALETTE -->
    <label>Color</label>
    <div id="colorChooser" style="display:flex; gap:10px; margin:8px 0 14px;">
      <button style="background:#6f5af0" onclick="selectColor('#6f5af0')"></button>
      <button style="background:#ff6b6b" onclick="selectColor('#ff6b6b')"></button>
      <button style="background:#2ecc71" onclick="selectColor('#2ecc71')"></button>
      <button style="background:#f1c40f" onclick="selectColor('#f1c40f')"></button>
      <button style="background:#3498db" onclick="selectColor('#3498db')"></button>
    </div>
    <div id="selectedColor" style="margin-bottom:10px;">Color: #6f5af0</div>

    <div style="margin-top:10px; display:flex; justify-content:flex-end; gap:10px;">
      <button onclick="closeBotModal()">Cancel</button>
      <button id="createBotBtn" onclick="createBot()">Create Bot</button>
    </div>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAF8YTlX0gmn51wD81I6yqJIi5evehXKfo",
  authDomain: "hyperai-r.firebaseapp.com",
  databaseURL: "https://hyperai-r-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "hyperai-r",
  storageBucket: "hyperai-r.firebasestorage.app",
  messagingSenderId: "129777724896",
  appId: "1:129777724896:web:6ceda58ba7103334e78f85",
  measurementId: "G-T5TVDRDHBN"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let currentUser = null;
let bots = JSON.parse(localStorage.getItem('bots') || '[]');
let convos = {};
let activeBot = null;

/* GOOGLE ONLY AUTH */
function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(console.error);
}

function signOut() {
  auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user => {
  if(user) {
    currentUser = user;
    document.getElementById('authContainer').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('signOutBtn').style.display = 'block';
    loadBots();
  } else {
    currentUser = null;
    document.getElementById('authContainer').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('signOutBtn').style.display = 'none';
  }
});

/* BOTS */
function loadBots() {
  const list = document.getElementById('bot-list');
  list.innerHTML = '';

  if(bots.length === 0) {
    list.innerHTML = 'No bots yet';
    return;
  }

  bots.forEach(b => {
  const btn = document.createElement('button');
  btn.innerHTML = `${b.icon || '🤖'} ${b.name}`;
  btn.style.color = b.color || 'white';
  btn.onclick = () => openChat(b);
  list.appendChild(btn);
  });
}

function openBotModal() {
  document.getElementById('botModal').style.display = 'flex';
}

function closeBotModal() {
  document.getElementById('botModal').style.display = 'none';
}

let selectedIcon = '🤖';
let selectedColor = '#6f5af0';

function selectIcon(icon) {
  selectedIcon = icon;
  document.getElementById('selectedIcon').innerText = 'Selected: ' + icon;
}

function selectColor(color) {
  selectedColor = color;
  document.getElementById('selectedColor').innerText = 'Color: ' + color;
}
function createBot() {
  const name = document.getElementById('botName').value.trim();
  const sys = document.getElementById('botSys').value.trim();
  const start = document.getElementById('botStart').value.trim();

  if(!name || !sys) return;

  const newBot = {
    id: 'bot_' + Date.now(),
    name,
    system: sys,
    startMsg: start,
    icon: selectedIcon,
    color: selectedColor
  };

  bots.push(newBot);
  localStorage.setItem('bots', JSON.stringify(bots));
  loadBots();
  openChat(newBot);
  closeBotModal();
}

/* CHAT */
function openChat(bot) {
  activeBot = bot;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
  document.getElementById('panel-chat').classList.add('show');

  document.getElementById('tb-title').innerText = bot.name;
  document.getElementById('tb-sub').innerText = 'Chat with ' + bot.name;

  const history = convos[bot.id] || [];
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';

  if(history.length === 0 && bot.startMsg) {
    appendMsg('bot', bot.startMsg);
    history.push({role:'bot', content:bot.startMsg});
    convos[bot.id] = history;
  }

  history.forEach(m => appendMsg(m.role, m.content));
}

function appendMsg(role, content) {
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user'?'msg-user':'');

  div.innerHTML = `
    <div class="avatar">${role==='user'?'U': activeBot ? activeBot.name[0] : '🤖'}</div>
    <div>
      <div>${role==='user'?'You':activeBot?activeBot.name:'Bot'}</div>
      <div class="msg-bubble">${content}</div>
    </div>
  `;

  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 9999;
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text || !activeBot) return;

  appendMsg('user', text);
  input.value = '';
  document.getElementById('sendBtn').disabled = true;

  if(!convos[activeBot.id]) convos[activeBot.id] = [];
  convos[activeBot.id].push({role:'user', content:text});

  appendMsg('bot', 'This is a placeholder reply.');
}

/* PANEL SWITCH */
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
  document.getElementById('panel-' + id).classList.add('show');
}

/* INPUT ENABLE */
document.getElementById('chatInput').addEventListener('input', () => {
  document.getElementById('sendBtn').disabled =
    !document.getElementById('chatInput').value.trim();
});
document.getElementById('sendBtn').addEventListener('click', sendMessage);
</script>

</body>
</html>
