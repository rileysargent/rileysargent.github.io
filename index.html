<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>C++ WebGL Snow Rider</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: sans-serif; overflow: hidden; }
        /* The Canvas is where your C++ OpenGL/WebGL code will actually draw */
        #canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: black; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20px; }
    </style>
</head>
<body>
    <!-- The game screen -->
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
    <div id="status">Downloading WebAssembly...</div>

    <script type='text/javascript'>
      var statusElement = document.getElementById('status');

      var Module = {
        preRun: [],
        postRun: [],
        print: (function() { return function(text) { console.log(text); }; })(),
        canvas: (function() {
          var canvas = document.getElementById('canvas');
          // Handle WebGL context loss
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. Please reload.'); e.preventDefault(); }, false);
          return canvas;
        })(),
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: '' };
          if (text === Module.setStatus.last.text) return;
          statusElement.innerHTML = text;
          if (!text) statusElement.style.display = 'none';
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');
      window.onerror = function() {
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function(text) { if (text) console.error('[status] ' + text); };
      };
    </script>

    <!-- This script is generated by your C++ compiler (Emscripten) -->
    <script async type="text/javascript" src="index.js"></script>
</body>
</html>
