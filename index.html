<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C++ WebGL Snow Rider</title>
    <style>
        body { margin: 0; background: #222; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        
        /* The Game Screen */
        #canvas { display: block; width: 100vw; height: 70vh; background: #000; border-bottom: 2px solid #444; }

        /* The In-Game Console */
        #console-container { height: 30vh; padding: 10px; background: #111; overflow-y: auto; box-sizing: border-box; }
        .log-entry { margin-bottom: 4px; border-left: 3px solid #0f0; padding-left: 8px; font-size: 14px; }
        .status-header { color: #fff; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="console-container">
        <div class="status-header">SYSTEM CONSOLE [BOOTING...]</div>
        <div id="log-output"></div>
    </div>

    <script>
        const logOutput = document.getElementById('log-output');
        const header = document.querySelector('.status-header');
        let wasmInstance;

        // 1. Helper function to print to our on-screen console
        function printToConsole(message) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.textContent = `> ${message}`;
            logOutput.appendChild(div);
            // Auto-scroll to the bottom
            const container = document.getElementById('console-container');
            container.scrollTop = container.scrollHeight;
        }

        // 2. Load the C++ WebAssembly Binary
        async function initGame() {
            printToConsole("Fetching index.wasm...");
            try {
                const response = await fetch('index.wasm');
                const bytes = await response.arrayBuffer();
                
                // This 'env' object must match the imports in your C++ code
                const importObject = {
                    env: {
                        memory: new WebAssembly.Memory({ initial: 256 }),
                        // If you added 'print_log' to your C++, this handles it:
                        print_log: (val) => printToConsole("Sled Position X: " + val.toFixed(2))
                    }
                };

                const results = await WebAssembly.instantiate(bytes, importObject);
                wasmInstance = results.instance.exports;
                
                header.textContent = "SNOW RIDER ENGINE [ACTIVE] | GIFTS: 154";
                printToConsole("Engine Initialized Successfully.");
                
                startLoop();
            } catch (err) {
                printToConsole("ERROR: " + err.message);
                header.textContent = "SYSTEM FAILURE";
                header.style.color = "red";
            }
        }

        // 3. Connect Keyboard Controls
        window.addEventListener('keydown', (e) => {
            if (!wasmInstance) return;
            if (e.key === "ArrowLeft" || e.key === "a") {
                wasmInstance.move_left();
            }
            if (e.key === "ArrowRight" || e.key === "d") {
                wasmInstance.move_right();
            }
        });

        // 4. Run the Game Loop at 60 FPS
        function startLoop() {
            setInterval(() => {
                wasmInstance.game_loop();
                // Optional: Update console with X position every 60 frames
                if (Math.random() < 0.02) { // Just for visual feedback
                    const x = wasmInstance.get_sled_x();
                    printToConsole(`Telemetry: X=${x.toFixed(2)}`);
                }
            }, 1000 / 60);
        }

        initGame();
    </script>
</body>
</html>
