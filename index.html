<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace | Pacific Education</title>
    <style>
        :root {
            --bg: #0b0e11; --panel: #15191c; --accent: #00d2ff; 
            --text: #ffffff; --dim: #94a3b8; --border: #2d3748; --danger: #f56565;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- LOGIN OVERLAY --- */
        #loginOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--panel); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .login-card h1 { color: var(--accent); margin: 0 0 10px 0; letter-spacing: 3px; }

        /* --- LAYOUT --- */
        header {
            background: var(--panel); padding: 12px 20px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        main { display: grid; grid-template-columns: 280px 1fr; flex-grow: 1; overflow: hidden; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .chat-section { display: flex; flex-direction: column; background: var(--bg); }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 75%; font-size: 0.95rem; }
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; }
        .msg.peer { background: var(--panel); align-self: flex-start; border: 1px solid var(--border); }

        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 10px; }
        input { background: #0b0e11; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; }
        button { background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; padding: 10px 20px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background: #2d3748; color: #4a5568; cursor: not-allowed; }

        .status-badge { background: #1a202c; padding: 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--border); }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; background: #4a5568; margin-right: 8px; }
        .dot.on { background: #48bb78; box-shadow: 0 0 8px #48bb78; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h1>HYPERSPACE</h1>
            <p style="color:var(--dim); margin-bottom: 30px;">Pacific Education Online</p>
            <button id="msLoginBtn" style="width: 100%; font-size: 1rem; padding: 15px;">Sign in with Microsoft</button>
        </div>
    </div>

    <header>
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 1px;">HYPERSPACE <span id="roomTitle" style="color:var(--dim); margin-left:10px; font-weight: normal;"></span></div>
        <div style="display: flex; gap: 10px;">
            <button id="hostBtn">Host</button>
            <input type="text" id="roomInput" placeholder="Room ID" style="width: 80px;">
            <button id="joinBtn">Join</button>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="status-badge">
                <span class="dot" id="statusDot"></span> <span id="statusLabel">Offline</span>
            </div>
            <button id="muteBtn" style="width: 100%;" disabled>Mute Microphone</button>
            <button id="kickBtn" style="width: 100%; background: var(--danger); color: white;" disabled>Kick Peer</button>
            
            <div style="margin-top: auto;">
                <div id="userEmail" style="font-size: 0.75rem; color: var(--dim); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis;"></div>
                <button id="logoutBtn" style="width: 100%; background: transparent; border: 1px solid var(--border); color: var(--dim);">Logout</button>
            </div>
        </div>

        <div class="chat-section">
            <div id="messages"></div>
            <div class="input-bar">
                <input type="text" id="chatInput" placeholder="Type a message..." style="flex-grow: 1;" disabled>
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </main>

    <audio id="remoteAudio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, onAuthStateChanged, signInWithPopup, OAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r",
            storageBucket: "hyperspace-r.firebasestorage.app",
            messagingSenderId: "1050495683444",
            appId: "1:1050495683444:web:846c42d274197b20313a21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const provider = new OAuthProvider('microsoft.com');

        provider.setCustomParameters({
            prompt: 'select_account',
            tenant: '2e4e411e-8b64-4856-8fa9-3a07ceaa8861' // Your Tenant ID
        });

        // --- AUTH ---
        document.getElementById('msLoginBtn').onclick = () => signInWithPopup(auth, provider).catch(console.error);
        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, user => {
            if (user && user.email.endsWith('@pacificeducation.online')) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('userEmail').innerText = user.email;
            } else if (user) {
                alert("Unauthorized domain."); signOut(auth);
            }
        });

        // --- WEBRTC ---
        let pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let localStream, dataChannel, roomId;

        const setStatus = (txt, on) => {
            document.getElementById('statusDot').className = on ? 'dot on' : 'dot';
            document.getElementById('statusLabel').innerText = txt;
        };

        async function startMedia() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];
            document.getElementById('muteBtn').disabled = false;
        }

        function setupDC() {
            dataChannel.onopen = () => {
                document.getElementById('chatInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                setStatus("Connected", true);
            };
            dataChannel.onmessage = e => appendMsg(e.data, 'peer');
        }

        document.getElementById('hostBtn').onclick = async () => {
            roomId = Math.floor(1000 + Math.random()*9000).toString();
            document.getElementById('roomTitle').innerText = `#${roomId}`;
            await startMedia();
            dataChannel = pc.createDataChannel("chat");
            setupDC();

            pc.onicecandidate = e => e.candidate && push(ref(db, `rooms/${roomId}/callerCandidates`), e.candidate.toJSON());
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            set(ref(db, `rooms/${roomId}`), { host: auth.currentUser.uid, offer: {sdp: offer.sdp, type: offer.type} });

            onValue(ref(db, `rooms/${roomId}/answer`), async s => {
                if(s.exists() && !pc.currentRemoteDescription) await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
            });
            onChildAdded(ref(db, `rooms/${roomId}/calleeCandidates`), s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
            setStatus("Waiting...", false);
        };

        document.getElementById('joinBtn').onclick = async () => {
            roomId = document.getElementById('roomInput').value;
            if(!roomId) return;
            await startMedia();
            pc.ondatachannel = e => { dataChannel = e.channel; setupDC(); };
            pc.onicecandidate = e => e.candidate && push(ref(db, `rooms/${roomId}/calleeCandidates`), e.candidate.toJSON());

            onValue(ref(db, `rooms/${roomId}`), async s => {
                const d = s.val();
                if(d?.offer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(d.offer));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    set(ref(db, `rooms/${roomId}/answer`), {sdp: ans.sdp, type: ans.type});
                }
                if(d?.kicked) location.reload();
            });
            onChildAdded(ref(db, `rooms/${roomId}/callerCandidates`), s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
        };

        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('chatInput').value;
            if(val && dataChannel.readyState === 'open') {
                dataChannel.send(val);
                appendMsg(val, 'me');
                document.getElementById('chatInput').value = "";
            }
        };

        document.getElementById('muteBtn').onclick = (e) => {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            e.target.innerText = t.enabled ? "Mute Microphone" : "Unmute Microphone";
            e.target.style.background = t.enabled ? "" : "var(--danger)";
        };

        document.getElementById('kickBtn').onclick = () => set(ref(db, `rooms/${roomId}/kicked`), true);

        function appendMsg(t, s) {
            const d = document.createElement('div'); d.className = `msg ${s}`; d.textContent = t;
            const m = document.getElementById('messages'); m.appendChild(d); m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
