<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace-R | Overlord Station</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; --panel: #111; }
        body, html { margin: 0; padding: 0; background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }

        /* --- CRT FX --- */
        #crt::before {
            content: " "; position: fixed; inset: 0; z-index: 5000; pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
        }
        #static { position: fixed; inset: 0; z-index: 4999; opacity: 0.05; pointer-events: none; background: url('https://media.giphy.com/media/oEI9uWUicKgR6/giphy.gif'); }

        /* --- UI PANELS --- */
        .overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; background: #000; transition: 0.5s; }
        .terminal { background: #0a0a0a; border: 2px solid #333; padding: 40px; border-radius: 10px; text-align: center; max-width: 400px; box-shadow: 0 0 50px #000; }
        
        /* --- DIAL --- */
        #dial-container { width: 300px; height: 300px; border: 12px solid #222; border-radius: 50%; margin: 20px auto; position: relative; background: radial-gradient(circle, #222, #000); cursor: grab; }
        #knob { position: absolute; inset: 0; pointer-events: none; transition: transform 0.1s ease-out; }
        #knob::after { content: ''; position: absolute; top: 15px; left: 50%; width: 8px; height: 35px; background: var(--red); transform: translateX(-50%); box-shadow: 0 0 15px var(--red); }

        .mhz-out { font-size: 5rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); margin: 10px 0; }
        .metal-btn { background: #111; color: var(--red); border: 1px solid var(--red); padding: 15px 30px; cursor: pointer; text-transform: uppercase; font-weight: bold; width: 100%; }
        .metal-btn:hover { background: var(--red); color: #000; }
        .hidden { display: none !important; }
        
        #radar { height: 120px; border: 1px solid #222; margin: 20px 0; display: flex; flex-direction: column; justify-content: center; gap: 5px; font-size: 0.8rem; overflow-y: auto; }
    </style>
</head>
<body>

<div id="crt"></div>
<div id="static"></div>

<div id="boot-gate" class="overlay">
    <div class="terminal">
        <h1 style="color:var(--gold)">HYPERSPACE-R</h1>
        <p>STATION HARDWARE DETECTED</p>
        <button class="metal-btn" onclick="initSystem()">POWER ON</button>
    </div>
</div>

<div id="auth-gate" class="overlay hidden">
    <div class="terminal">
        <div id="login-ui">
            <p>AWAITING GOOGLE IDENT...</p>
            <button class="metal-btn" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
        <div id="claim-ui" class="hidden">
            <p>NAME NOT FOUND. CLAIM IDENTITY:</p>
            <input type="text" id="username-claim" placeholder="..." style="background:transparent; border:none; border-bottom:2px solid var(--red); color:var(--red); text-align:center; font-size:1.5rem; outline:none; margin-bottom:20px; width: 100%;">
            <button class="metal-btn" onclick="claimName()">CONFIRM</button>
        </div>
    </div>
</div>

<div id="station-ui" class="overlay hidden" style="flex-direction: column;">
    <div class="terminal" style="width: 500px; max-width: 90vw;">
        <div id="frequency-view">
            <div class="mhz-out" id="readout">88.0</div>
            <div id="dial-container">
                <div id="knob"></div>
            </div>
            <button class="metal-btn" onclick="tuneIntoFolder()">ESTABLISH LINK</button>
        </div>

        <div id="lobby-view" class="hidden">
            <h2 id="folder-label" style="color:var(--gold); margin:0;">880_MHZ</h2>
            <div id="radar">Scanning for peers...</div>
            <div id="host-tools" class="hidden">
                <p style="font-size:0.6rem; color:#444;">[HOST PRIVILEGES GRANTED]</p>
                <button class="metal-btn" style="border-color:var(--gold); color:var(--gold);">GO LIVE</button>
            </div>
            <button class="metal-btn" style="margin-top:10px; font-size:0.6rem;" onclick="location.reload()">DISCONNECT</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CREDENTIALS ---
    const firebaseConfig = {
      apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
      authDomain: "hyperspace-r.firebaseapp.com",
      databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "hyperspace-r",
      storageBucket: "hyperspace-r.firebasestorage.app",
      messagingSenderId: "1050495683444",
      appId: "1:1050495683444:web:42d7284bee34d749313a21",
      measurementId: "G-RRQTTD9M4V"
    };

    let db, auth, rtdb, userProfile;
    let mhz = 88.0;
    let currentFolderID = "";

    // --- 1. BOOT ---
    function initSystem() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        rtdb = firebase.database();

        document.getElementById('boot-gate').classList.add('hidden');
        document.getElementById('auth-gate').classList.remove('hidden');

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                    userProfile = doc.data();
                    openTuner();
                } else {
                    document.getElementById('login-ui').classList.add('hidden');
                    document.getElementById('claim-ui').classList.remove('hidden');
                }
            }
        });
    }

    // --- 2. AUTH ---
    async function handleLogin() {
        const provider = new firebase.auth.GoogleAuthProvider();
        try { await auth.signInWithPopup(provider); } catch(e) { alert("Popup Blocked or Origin Error."); }
    }

    async function claimName() {
        const name = document.getElementById('username-claim').value.trim().toLowerCase();
        if(name.length < 3) return;
        const check = await db.collection("users").where("username", "==", name).get();
        if(!check.empty) return alert("Identity already exists on airwaves.");
        
        userProfile = { uid: auth.currentUser.uid, username: name };
        await db.collection("users").doc(auth.currentUser.uid).set(userProfile);
        openTuner();
    }

    function openTuner() {
        document.getElementById('auth-gate').classList.add('hidden');
        document.getElementById('station-ui').classList.remove('hidden');
    }

    // --- 3. DIAL LOGIC ---
    const dial = document.getElementById('dial-container');
    const knob = document.getElementById('knob');
    let dragging = false;

    dial.onmousedown = () => dragging = true;
    window.onmouseup = () => dragging = false;
    window.onmousemove = (e) => {
        if(!dragging) return;
        const rect = dial.getBoundingClientRect();
        const angle = Math.atan2(e.clientY - (rect.top + 150), e.clientX - (rect.left + 150)) * (180 / Math.PI) + 90;
        knob.style.transform = `rotate(${angle}deg)`;
        
        const norm = (angle % 360 + 360) % 360;
        mhz = (88 + (norm / 360) * 20).toFixed(1);
        document.getElementById('readout').innerText = mhz;
        document.getElementById('static').style.opacity = 0.04 + Math.abs(mhz - Math.round(mhz)) * 0.2;
    };

    // --- 4. FOLDER JOINING LOGIC ---
    async function tuneIntoFolder() {
        // Variable writing frequency as folder name (stripping dots)
        currentFolderID = mhz.toString().replace('.', '');
        document.getElementById('frequency-view').classList.add('hidden');
        document.getElementById('lobby-view').classList.remove('hidden');
        document.getElementById('folder-label').innerText = currentFolderID + "_SIG";

        const fRef = db.collection("matches").doc(currentFolderID);
        const doc = await fRef.get();

        if (!doc.exists) {
            // YOU ARE THE HOST OF THIS FOLDER
            await fRef.set({
                mhz: mhz,
                host: userProfile.username,
                players: [userProfile.username],
                status: "waiting"
            });
            
            // Presence: Delete folder when Host disconnects
            const pRef = rtdb.ref(`broadcasts/${currentFolderID}`);
            pRef.set(true);
            pRef.onDisconnect().remove().then(() => fRef.delete());
            
            document.getElementById('host-tools').classList.remove('hidden');
        } else {
            // JOINING EXISTING FOLDER
            await fRef.update({
                players: firebase.firestore.FieldValue.arrayUnion(userProfile.username)
            });
        }

        // Live Watch the Folder
        fRef.onSnapshot(snap => {
            const data = snap.data();
            if(!data) { document.getElementById('radar').innerHTML = "SIGNAL LOST"; return; }
            document.getElementById('radar').innerHTML = `<strong>HOST:</strong> ${data.host}<br>` + 
                data.players.filter(p => p !== data.host).map(p => `<strong>PEER:</strong> ${p}`).join('<br>');
        });
    }
</script>
</body>
</html>
