<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperspace-R | Server Matrix</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; --dim: #331111; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* --- SERVER LIST SIDEBAR --- */
        #sidebar { width: 300px; background: #080808; border-right: 2px solid #222; padding: 20px; overflow-y: auto; z-index: 100; }
        .server-item { padding: 15px; border: 1px solid #111; margin-bottom: 10px; cursor: pointer; transition: 0.3s; font-size: 0.8rem; }
        .server-item:hover { border-color: var(--red); background: #110000; }
        .server-item.active { border-color: var(--gold); background: #1a1500; }

        /* --- MAIN CONSOLE --- */
        #console { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #static { position: fixed; inset: 0; opacity: 0.04; pointer-events: none; background: url('https://media.giphy.com/media/oEI9uWUicKgR6/giphy.gif'); z-index: 1; }

        .dial-mount { width: 260px; height: 260px; border: 10px solid #222; border-radius: 50%; position: relative; background: radial-gradient(circle, #1a1a1a, #000); cursor: grab; z-index: 2; }
        #knob { position: absolute; inset: 0; pointer-events: none; transition: transform 0.1s ease-out; }
        #knob::after { content: ''; position: absolute; top: 10px; left: 50%; width: 8px; height: 30px; background: var(--red); transform: translateX(-50%); box-shadow: 0 0 10px var(--red); }

        .mhz-text { font-size: 5rem; color: var(--gold); text-shadow: 0 0 20px var(--gold); z-index: 2; margin: 10px 0; }
        
        /* --- BUTTON STATES --- */
        .btn-group { display: flex; gap: 10px; width: 300px; z-index: 2; margin-top: 20px; }
        button { flex: 1; padding: 15px; font-weight: bold; cursor: pointer; border: 1px solid var(--red); background: #000; color: var(--red); text-transform: uppercase; }
        button:disabled { border-color: #222; color: #444; cursor: not-allowed; opacity: 0.3; }
        button.join-mode { border-color: #00ff00; color: #00ff00; }
        button.join-mode:hover { background: #00ff00; color: #000; }
        
        .hidden { display: none !important; }
        #radar { width: 400px; background: #0a0a0a; border: 1px solid #333; padding: 20px; z-index: 10; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="static"></div>

<div id="sidebar">
    <h3 style="color:var(--gold); margin-top:0;">AIRWAVE SCANNER</h3>
    <div id="server-list">Scanning...</div>
</div>

<div id="console">
    <div id="boot-screen" style="z-index:100; text-align:center;">
        <h1 style="color:var(--gold)">HYPERSPACE-R</h1>
        <button onclick="powerOn()" style="width:200px;">POWER ON</button>
    </div>

    <div id="station-ui" class="hidden" style="text-align:center;">
        <div class="mhz-text" id="readout">88.0</div>
        <div class="dial-mount" id="dial">
            <div id="knob"></div>
        </div>

        <div class="btn-group">
            <button id="host-btn" onclick="action('host')">Broadcast</button>
            <button id="join-btn" onclick="action('join')" class="join-mode" disabled>Join Signal</button>
        </div>

        <div id="radar" class="hidden">
            <h4 id="freq-id" style="color:var(--gold)">---</h4>
            <div id="players">Searching...</div>
            <button onclick="location.reload()" style="margin-top:15px; font-size:0.6rem;">Kill Signal</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:42d7284bee34d749313a21",
        measurementId: "G-RRQTTD9M4V"
    };

    let db, auth, rtdb, userProfile, mhz = 88.0, activeServers = {};

    function powerOn() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        rtdb = firebase.database();
        
        document.getElementById('boot-screen').classList.add('hidden');
        document.getElementById('station-ui').classList.remove('hidden');

        auth.signInAnonymously().then(() => {
            userProfile = { username: "USER_" + Math.floor(Math.random()*9999) };
            listenForServers();
        });
    }

    // --- DIAL LOGIC ---
    const dial = document.getElementById('dial');
    const knob = document.getElementById('knob');
    let dragging = false;

    dial.onmousedown = () => dragging = true;
    window.onmouseup = () => dragging = false;
    window.onmousemove = (e) => {
        if(!dragging) return;
        const rect = dial.getBoundingClientRect();
        const angle = Math.atan2(e.clientY - (rect.top + 130), e.clientX - (rect.left + 130)) * (180 / Math.PI) + 90;
        knob.style.transform = `rotate(${angle}deg)`;
        
        const norm = (angle % 360 + 360) % 360;
        mhz = (88 + (norm / 360) * 20).toFixed(1);
        document.getElementById('readout').innerText = mhz;
        checkFrequencyStatus();
    };

    // --- SERVER LIST LOGIC ---
    function listenForServers() {
        db.collection("matches").onSnapshot(snap => {
            const list = document.getElementById('server-list');
            list.innerHTML = "";
            activeServers = {};

            snap.forEach(doc => {
                const data = doc.data();
                const id = doc.id;
                activeServers[id] = data;

                const item = document.createElement('div');
                item.className = 'server-item';
                item.innerHTML = `<strong>${data.mhz} MHz</strong><br>Host: ${data.host}<br>Peers: ${data.players.length}`;
                item.onclick = () => {
                    mhz = data.mhz;
                    document.getElementById('readout').innerText = mhz;
                    const rot = ((mhz - 88) / 20) * 360;
                    knob.style.transform = `rotate(${rot}deg)`;
                    checkFrequencyStatus();
                };
                list.appendChild(item);
            });
            checkFrequencyStatus();
        });
    }

    // --- BUTTON INTELLIGENCE ---
    function checkFrequencyStatus() {
        const id = mhz.toString().replace('.', '');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');

        if (activeServers[id]) {
            // Signal exists: Join only
            hostBtn.disabled = true;
            joinBtn.disabled = false;
        } else {
            // Airwaves clear: Host only
            hostBtn.disabled = false;
            joinBtn.disabled = true;
        }
    }

    // --- ACTION: HOST OR JOIN ---
    async function action(type) {
        const id = mhz.toString().replace('.', '');
        const fRef = db.collection("matches").doc(id);

        document.getElementById('dial').classList.add('hidden');
        document.querySelector('.btn-group').classList.add('hidden');
        document.getElementById('radar').classList.remove('hidden');
        document.getElementById('freq-id').innerText = id + "_SIG";

        if (type === 'host') {
            await fRef.set({
                mhz: mhz,
                host: userProfile.username,
                players: [userProfile.username]
            });
            // Cleanup logic
            const pRef = rtdb.ref(`broadcasts/${id}`);
            pRef.set(true);
            pRef.onDisconnect().remove().then(() => fRef.delete());
        } else {
            await fRef.update({
                players: firebase.firestore.FieldValue.arrayUnion(userProfile.username)
            });
        }

        fRef.onSnapshot(snap => {
            const data = snap.data();
            if(!data) return;
            document.getElementById('players').innerHTML = data.players.map(p => `[${p}]`).join(' ');
        });
    }
</script>
</body>
</html>
