<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omega UNO - Narrabri Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,900&display=swap');
        body { margin: 0; background: #0a0a0a; font-family: 'Kanit', sans-serif; overflow: hidden; color: white; }
        .uno-font { font-style: italic; text-transform: uppercase; letter-spacing: -2px; }
        input { color: black; }
        .menu-card { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="auth-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black">
        <div class="menu-card p-10 rounded-3xl w-96 text-center">
            <h1 class="text-6xl mb-6 uno-font italic text-red-600">LOGIN</h1>
            <div class="space-y-4">
                <button onclick="loginGoogle()" class="w-full bg-white text-black py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/pwa/google.svg" class="w-5"> Google Sign-In
                </button>
                <div class="text-zinc-500 text-xs uppercase py-2">or email</div>
                <input id="email" type="email" placeholder="Email" class="w-full p-3 rounded-xl">
                <input id="pass" type="password" placeholder="Password" class="w-full p-3 rounded-xl">
                <button onclick="loginEmail()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">Enter Lobby</button>
            </div>
        </div>
    </div>

    <div id="main-menu" class="fixed inset-0 z-50 flex items-center justify-center bg-zinc-950 hidden">
        <div class="text-center">
            <h1 class="text-8xl mb-2 uno-font italic">OMEGA <span class="text-red-600">UNO</span></h1>
            <p class="text-zinc-500 mb-10 tracking-[0.3em] uppercase">Original • Flip • No Mercy</p>
            <div class="flex flex-col gap-4 w-80 mx-auto">
                <button id="btn-multi" class="bg-white text-black py-4 rounded-full font-black text-xl hover:scale-105 transition">MULTIPLAYER</button>
                <button id="btn-ai" class="bg-zinc-800 text-white py-4 rounded-full font-black text-xl hover:bg-zinc-700 transition">VS BOTS (AI)</button>
            </div>
        </div>
    </div>

    <div id="game-ui" class="fixed inset-0 pointer-events-none hidden z-10">
        <div class="absolute top-10 left-10 p-4 menu-card rounded-xl pointer-events-auto">
            <div id="turn-text" class="text-2xl text-yellow-400">CONNECTING...</div>
            <div id="mode-text" class="text-xs opacity-50 uppercase">Light Side</div>
        </div>
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 pointer-events-auto flex gap-4">
            <button onclick="drawCard()" class="bg-white text-black px-12 py-4 rounded-full font-black text-xl shadow-2xl">DRAW</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // YOUR CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r",
            storageBucket: "hyperspace-r.firebasestorage.app",
            messagingSenderId: "1050495683444",
            appId: "1:1050495683444:web:42d7284bee34d749313a21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- AUTH LOGIC ---
        window.loginGoogle = async () => {
            const provider = new GoogleAuthProvider();
            try {
                await signInWithPopup(auth, provider);
                showMainMenu();
            } catch (e) { alert(e.message); }
        };

        window.loginEmail = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                showMainMenu();
            } catch (e) { alert("Try Google Login or check credentials."); }
        };

        function showMainMenu() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        // --- BUTTON HANDLERS ---
        document.getElementById('btn-multi').onclick = () => startMultiplayer();
        document.getElementById('btn-ai').onclick = () => alert("AI Mode coming soon to Narrabri!");

        // --- GAME LOGIC ---
        let gameId = "narrabri-room-1";
        
        async function startMultiplayer() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            // Listen to Game State
            onSnapshot(doc(db, "games", gameId), (snap) => {
                if (snap.exists()) {
                    updateTable(snap.data());
                } else {
                    createGame();
                }
            });
        }

        async function createGame() {
            await setDoc(doc(db, "games", gameId), {
                side: 'light',
                pile: { color: 'red', value: '7' },
                turn: 0
            });
        }

        // --- 2.5D RENDERER ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pLight = new THREE.PointLight(0xffffff, 1);
        pLight.position.set(5, 5, 5);
        scene.add(pLight);

        camera.position.set(0, -6, 8);
        camera.lookAt(0, 0, 0);

        function updateTable(data) {
            // Remove old cards
            while(scene.children.length > 2) scene.remove(scene.children[scene.children.length-1]);
            
            // Add current pile card
            const geo = new THREE.BoxGeometry(2, 3, 0.1);
            const mat = new THREE.MeshStandardMaterial({ color: data.pile.color === 'red' ? 0xff0000 : 0x0000ff });
            const card = new THREE.Mesh(geo, mat);
            scene.add(card);

            document.getElementById('turn-text').innerText = "LIVE MATCH";
            document.getElementById('mode-text').innerText = data.side + " side";
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
