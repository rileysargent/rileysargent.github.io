<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Infinite Craft: Gemini Edition</title>
    <style>
        :root {
            --bg: #0b0e14;
            --sidebar-bg: #1a1d23;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --item-bg: #252932;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        #inventory {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 0;
        }

        /* Canvas */
        #canvas {
            flex-grow: 1;
            position: relative;
            background-image: radial-gradient(#222 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Item Styling */
        .item {
            padding: 8px 14px;
            background: var(--item-bg);
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .canvas-item { position: absolute; cursor: grab; z-index: 10; }
        
        .controls { position: absolute; bottom: 20px; right: 20px; }
        button { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; cursor: pointer; border-radius: 4px; }
        button:hover { background: var(--accent); }

        #status { margin-top: 10px; font-size: 12px; color: #888; text-align: center; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2 style="margin-top:0">Gemini Craft</h2>
    <div id="inventory"></div>
    <div id="status">Click items to spawn</div>
</div>

<div id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)">
    <div class="controls">
        <button onclick="document.querySelectorAll('.canvas-item').forEach(e => e.remove())">Clear Board</button>
    </div>
</div>

<script>
    // Update this with your actual Render service URL
    const RENDER_URL = "https://your-app-name.onrender.com"; 

    // Load from local storage or start with basics
    let discovered = JSON.parse(localStorage.getItem('craft_saves')) || ["🌍 Earth", "🔥 Fire", "💧 Water", "🌬️ Wind"];

    function init() {
        renderInventory();
    }

    function renderInventory() {
        const inv = document.getElementById('inventory');
        inv.innerHTML = '';
        discovered.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item';
            div.innerText = item;
            
            // 1. DUPLICATE WITHOUT DOUBLE CLICK: Single click spawns on board
            div.onclick = () => createCanvasElement(item, 40 + (Math.random() * 30), 40 + (Math.random() * 30));
            
            div.draggable = true;
            div.ondragstart = (e) => e.dataTransfer.setData("text", item);
            inv.appendChild(div);
        });
    }

    function allowDrop(ev) { ev.preventDefault(); }

    function drop(ev) {
        ev.preventDefault();
        const text = ev.dataTransfer.getData("text");
        const rect = document.getElementById('canvas').getBoundingClientRect();
        const x = ev.clientX - rect.left;
        const y = ev.clientY - rect.top;

        // Check if dropped on another item
        const target = document.elementFromPoint(ev.clientX, ev.clientY).closest('.canvas-item');
        
        if (target) {
            // This now triggers for Earth+Earth OR Earth+Fire
            combine(text, target.innerText, target);
        } else {
            createCanvasElement(text, x, y);
        }
    }

    function createCanvasElement(text, x, y) {
        const div = document.createElement('div');
        div.className = 'item canvas-item';
        div.innerText = text;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.draggable = true;
        div.ondragstart = (e) => {
            e.dataTransfer.setData("text", text);
            // Removes it from the current spot so it "moves"
            setTimeout(() => div.remove(), 0); 
        };
        document.getElementById('canvas').appendChild(div);
    }

    async function combine(item1, item2, targetEl) {
        const status = document.getElementById('status');
        status.innerText = "Crafting with Gemini...";

        try {
            const response = await fetch(`${RENDER_URL}/combine`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ item1, item2 })
            });
            
            const data = await response.json();
            const result = data.result;

            // Add to sidebar if it's a new discovery
            if (!discovered.includes(result)) {
                discovered.push(result);
                localStorage.setItem('craft_saves', JSON.stringify(discovered));
                renderInventory();
            }

            // Replace the item on the board with the new one
            createCanvasElement(result, parseInt(targetEl.style.left), parseInt(targetEl.style.top));
            targetEl.remove();
            status.innerText = "New Item: " + result;
            
        } catch (e) {
            status.innerText = "Server error. Is Render awake?";
            console.error(e);
        }
    }

    init();
</script>
</body>
</html>
