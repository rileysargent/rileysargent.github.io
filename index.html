<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace | Secure Voice & Chat</title>
    <style>
        :root {
            --bg: #0b0e11; --panel: #15191c; --accent: #00d2ff; 
            --text: #ffffff; --dim: #94a3b8; --border: #2d3748; --danger: #f56565;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* --- AUTH OVERLAY --- */
        #authOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-card {
            background: var(--panel); padding: 40px; border-radius: 20px;
            border: 1px solid var(--border); width: 90%; max-width: 400px; text-align: center;
        }
        .auth-card h1 { color: var(--accent); margin: 0 0 10px 0; letter-spacing: 3px; }

        /* --- LAYOUT --- */
        header {
            background: var(--panel); padding: 12px 20px; display: flex;
            justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border);
        }
        main { display: grid; grid-template-columns: 280px 1fr; flex-grow: 1; overflow: hidden; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .chat-section { display: flex; flex-direction: column; background: var(--bg); }
        
        #messages { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; max-width: 75%; font-size: 0.95rem; }
        .msg.me { background: var(--accent); color: #000; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg.peer { background: var(--panel); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        .input-bar { padding: 20px; background: var(--panel); display: flex; gap: 10px; border-top: 1px solid var(--border); }
        input { background: #0b0e11; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; font-size: 1rem; }
        button { background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 8px; padding: 10px 20px; transition: 0.2s; }
        button:hover { filter: brightness(1.1); transform: translateY(-1px); }
        button:disabled { background: #2d3748; color: #4a5568; cursor: not-allowed; }

        .status-badge { background: #1a202c; padding: 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--border); }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; background: #4a5568; margin-right: 8px; }
        .dot.on { background: #48bb78; box-shadow: 0 0 8px #48bb78; }
        
        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <h1>HYPERSPACE</h1>
            <p style="color:var(--dim); margin-bottom: 25px;">Enter your school email to receive a login link.</p>
            <input type="email" id="emailInput" placeholder="name@stu.pacificeducation.online" style="width: 100%; box-sizing: border-box; margin-bottom: 15px;">
            <button id="sendLinkBtn" style="width: 100%;">Send Magic Link</button>
            <p id="authMsg" style="margin-top: 20px; font-size: 0.9rem; color: var(--accent);"></p>
        </div>
    </div>

    <header>
        <div style="font-weight: bold; color: var(--accent); letter-spacing: 1px;">HYPERSPACE <span id="roomDisplay" style="color:var(--dim); margin-left:10px; font-weight: normal;"></span></div>
        <div style="display: flex; gap: 10px;">
            <button id="hostBtn">Host</button>
            <input type="text" id="roomInput" placeholder="Room ID" style="width: 80px;">
            <button id="joinBtn">Join</button>
        </div>
    </header>

    <main>
        <div class="sidebar">
            <div class="status-badge">
                <span class="dot" id="statusDot"></span> <span id="statusLabel">Offline</span>
            </div>
            <button id="muteBtn" style="width: 100%;" disabled>Mute Microphone</button>
            <button id="kickBtn" style="width: 100%; background: var(--danger); color: white;" disabled>Kick Peer</button>
            
            <div style="margin-top: auto;">
                <div id="userDisplay" style="font-size: 0.75rem; color: var(--dim); margin-bottom: 10px; word-break: break-all;"></div>
                <button id="logoutBtn" style="width: 100%; background: transparent; border: 1px solid var(--border); color: var(--dim);">Sign Out</button>
            </div>
        </div>

        <div class="chat-section">
            <div id="messages"></div>
            <div class="input-bar">
                <input type="text" id="chatInput" placeholder="Type a message..." style="flex-grow: 1;" disabled>
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </main>

    <audio id="remoteAudio" autoplay></audio>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
        import { getAuth, isSignInWithEmailLink, sendSignInLinkToEmail, signInWithEmailLink, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "hyperspace-r",
            storageBucket: "hyperspace-r.firebasestorage.app",
            messagingSenderId: "1050495683444",
            appId: "1:1050495683444:web:846c42d274197b20313a21"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- MAGIC LINK AUTH LOGIC ---
        
        // 1. Handle the "Catch": If user just landed here from an email link
        if (isSignInWithEmailLink(auth, window.location.href)) {
            let email = window.localStorage.getItem('emailForSignIn');
            if (!email) {
                email = window.prompt('Please provide your email for confirmation');
            }
            signInWithEmailLink(auth, email, window.location.href)
                .then(() => {
                    window.localStorage.removeItem('emailForSignIn');
                    window.history.replaceState({}, document.title, window.location.pathname);
                })
                .catch(err => {
                    alert("The link is invalid or has expired.");
                    console.error(err);
                });
        }

        // 2. Handle the "Send": Trigger the email link
        document.getElementById('sendLinkBtn').onclick = async () => {
            const email = document.getElementById('emailInput').value;
            if (!email.endsWith('@stu.pacificeducation.online')) {
                return alert("Access Restricted: Please use your @pacificeducation.online email.");
            }

            const actionCodeSettings = {
                url: window.location.href, // Returns user to this exact page
                handleCodeInApp: true
            };

            try {
                await sendSignInLinkToEmail(auth, email, actionCodeSettings);
                window.localStorage.setItem('emailForSignIn', email);
                document.getElementById('authMsg').innerText = "Check your inbox for the login link!";
            } catch (error) {
                alert("Error: " + error.message);
            }
        };

        // 3. Auth Observer
        onAuthStateChanged(auth, user => {
            if (user && user.email.endsWith('@pacificeducation.online')) {
                document.getElementById('authOverlay').style.display = 'none';
                document.getElementById('userDisplay').innerText = user.email;
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
                if(user) signOut(auth); // Kick if domain wrong
            }
        });

        document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());

        // --- WEBRTC SIGNALING ---
        let pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        let localStream, dataChannel, roomId;

        const setStatus = (txt, on) => {
            document.getElementById('statusDot').className = on ? 'dot on' : 'dot';
            document.getElementById('statusLabel').innerText = txt;
        };

        async function initMedia() {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            pc.ontrack = e => document.getElementById('remoteAudio').srcObject = e.streams[0];
            document.getElementById('muteBtn').disabled = false;
        }

        function setupDataChannel() {
            dataChannel.onopen = () => {
                document.getElementById('chatInput').disabled = false;
                document.getElementById('sendBtn').disabled = false;
                setStatus("Peer Connected", true);
            };
            dataChannel.onmessage = e => appendMsg(e.data, 'peer');
        }

        // --- HOST ---
        document.getElementById('hostBtn').onclick = async () => {
            roomId = Math.floor(1000 + Math.random()*9000).toString();
            document.getElementById('roomDisplay').innerText = `#${roomId}`;
            await initMedia();
            
            dataChannel = pc.createDataChannel("chat");
            setupDataChannel();

            pc.onicecandidate = e => e.candidate && push(ref(db, `rooms/${roomId}/callerCandidates`), e.candidate.toJSON());
            
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            set(ref(db, `rooms/${roomId}`), { 
                host: auth.currentUser.uid, 
                offer: {sdp: offer.sdp, type: offer.type} 
            });

            onValue(ref(db, `rooms/${roomId}/answer`), async s => {
                if(s.exists() && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(s.val()));
                    document.getElementById('kickBtn').disabled = false;
                }
            });

            onChildAdded(ref(db, `rooms/${roomId}/calleeCandidates`), s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
            setStatus("Waiting for peer...", false);
        };

        // --- JOIN ---
        document.getElementById('joinBtn').onclick = async () => {
            roomId = document.getElementById('roomInput').value;
            if(!roomId) return alert("Enter Room ID");
            await initMedia();

            pc.ondatachannel = e => { dataChannel = e.channel; setupDataChannel(); };
            pc.onicecandidate = e => e.candidate && push(ref(db, `rooms/${roomId}/calleeCandidates`), e.candidate.toJSON());

            onValue(ref(db, `rooms/${roomId}`), async s => {
                const data = s.val();
                if (data?.offer && !pc.currentRemoteDescription) {
                    await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    set(ref(db, `rooms/${roomId}/answer`), {sdp: ans.sdp, type: ans.type});
                }
                if (data?.kicked) { alert("Kicked by host"); location.reload(); }
            });

            onChildAdded(ref(db, `rooms/${roomId}/callerCandidates`), s => pc.addIceCandidate(new RTCIceCandidate(s.val())));
        };

        // --- UI HELPERS ---
        document.getElementById('sendBtn').onclick = () => {
            const val = document.getElementById('chatInput').value;
            if(val && dataChannel.readyState === 'open') {
                dataChannel.send(val);
                appendMsg(val, 'me');
                document.getElementById('chatInput').value = "";
            }
        };

        document.getElementById('muteBtn').onclick = (e) => {
            const t = localStream.getAudioTracks()[0];
            t.enabled = !t.enabled;
            e.target.innerText = t.enabled ? "Mute Microphone" : "Unmute Microphone";
            e.target.style.background = t.enabled ? "" : "var(--danger)";
        };

        document.getElementById('kickBtn').onclick = () => set(ref(db, `rooms/${roomId}/kicked`), true);

        function appendMsg(t, s) {
            const div = document.createElement('div');
            div.className = `msg ${s}`;
            div.textContent = t;
            const m = document.getElementById('messages');
            m.appendChild(div);
            m.scrollTop = m.scrollHeight;
        }
    </script>
</body>
</html>
