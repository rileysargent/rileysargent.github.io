<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botforge | Narrabri</title>
    <style>
        /* CSS is inside the HTML for simplicity */
        body { background: #0b0b0e; color: #d1d1d1; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #222; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #2a1b3d; align-self: flex-end; margin-left: auto; color: #d4a5ff; }
        .bot { background: #1a1a1f; border: 1px solid #333; }
        .input-area { padding: 20px; display: flex; gap: 10px; background: #121217; }
        input { flex: 1; background: #1e1e24; border: 1px solid #333; color: white; padding: 12px; border-radius: 5px; }
        button { background: #6a0dad; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type to interact...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const RENDER_API = "https://webapi3.onrender.com";
        const botId = "main_bot";

        // Load History from LocalStorage
        const chatDisplay = document.getElementById('chat');
        let history = JSON.parse(localStorage.getItem(`history_${botId}`)) || [];
        history.forEach(m => addMessage(m.role, m.text));

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            addMessage("User", text);
            input.value = "";

            try {
                const response = await fetch(`${RENDER_API}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, botId: botId })
                });
                const data = await response.json();
                addMessage("Bot", data.reply);
                
                // Save updated history
                history.push({role: "User", text}, {role: "Bot", text: data.reply});
                localStorage.setItem(`history_${botId}`, JSON.stringify(history.slice(-50)));
            } catch (err) {
                addMessage("System", "Render API offline. Check your dashboard.");
            }
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role.toLowerCase()}`;
            div.innerHTML = `<strong>${role}:</strong> ${text}`;
            chatDisplay.appendChild(div);
            chatDisplay.scrollTop = chatDisplay.scrollHeight;
        }
    </script>
</body>
</html>
