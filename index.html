<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Craft: Narrabri Edition</title>
    <style>
        :root {
            --bg: #ffffff;
            --sidebar: #f0f2f5;
            --item-bg: #fff;
            --border: #ddd;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; background: var(--bg); }

        /* Sidebar Styles */
        #sidebar {
            width: 300px;
            background: var(--sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .inventory { display: flex; flex-wrap: wrap; gap: 10px; overflow-y: auto; }

        /* Canvas Styles */
        #canvas {
            flex-grow: 1;
            position: relative;
            background-image: radial-gradient(#d1d1d1 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .item {
            padding: 8px 15px;
            background: var(--item-bg);
            border: 1px solid var(--border);
            border-radius: 5px;
            cursor: grab;
            user-select: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: inline-block;
            white-space: nowrap;
            font-size: 14px;
        }

        .canvas-item { position: absolute; }

        .loading { font-style: italic; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Gemini Craft</h2>
    <p>Combine items to discover new ones!</p>
    <div class="inventory" id="inventory">
        <div class="item" draggable="true" ondragstart="drag(event)">💧 Water</div>
        <div class="item" draggable="true" ondragstart="drag(event)">🔥 Fire</div>
        <div class="item" draggable="true" ondragstart="drag(event)">🌍 Earth</div>
        <div class="item" draggable="true" ondragstart="drag(event)">🌬️ Wind</div>
    </div>
    <div id="status" class="loading"></div>
</div>

<div id="canvas" ondrop="drop(event)" ondragover="allowDrop(event)"></div>

<script>
    // --- CONFIGURATION ---
    const GEMINI_API_KEY = "YOUR_API_KEY_HERE"; // Replace with your actual key
    const inventorySet = new Set(["Water", "Fire", "Earth", "Wind"]);

    // Helper to extract text without emoji
    const clean = (str) => str.replace(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]/gu, "").trim();

    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData("text", ev.target.innerText);
    }

    async function drop(ev) {
        ev.preventDefault();
        const data = ev.dataTransfer.getData("text");
        const rect = ev.target.getBoundingClientRect();
        const x = ev.clientX - (ev.target.id === "canvas" ? rect.left : 0);
        const y = ev.clientY - (ev.target.id === "canvas" ? rect.top : 0);

        // Check if we dropped on another item
        const targetItem = ev.target.closest('.canvas-item');
        if (targetItem && ev.target.id !== "canvas") {
            const item1 = clean(data);
            const item2 = clean(targetItem.innerText);
            combineElements(item1, item2, targetItem);
        } else {
            // Just place on canvas
            createCanvasItem(data, x, y);
        }
    }

    function createCanvasItem(label, x, y) {
        const div = document.createElement('div');
        div.className = 'item canvas-item';
        div.innerText = label;
        div.style.left = (x - 40) + 'px';
        div.style.top = (y - 20) + 'px';
        div.draggable = true;
        div.ondragstart = drag;
        document.getElementById('canvas').appendChild(div);
    }

    async function combineElements(a, b, targetElement) {
        const status = document.getElementById('status');
        status.innerText = `Combining ${a} + ${b}...`;

        let result = "";
        
        // 1. Mock logic for speed
        const recipes = {
            "Fire+Water": "💨 Steam",
            "Earth+Water": "🌱 Plant",
            "Earth+Fire": "🌋 Lava",
            "Wind+Earth": "🏜️ Dust"
        };
        const key = [a, b].sort().join('+');
        
        if (recipes[key]) {
            result = recipes[key];
        } else if (GEMINI_API_KEY !== "YOUR_API_KEY_HERE") {
            // 2. Real Gemini AI Logic
            result = await fetchGeminiCombination(a, b);
        } else {
            result = `✨ ${a}${b}`; // Fallback if no API key
        }

        // Add to inventory if new
        const resultName = clean(result);
        if (!inventorySet.has(resultName)) {
            inventorySet.add(resultName);
            const newItem = document.createElement('div');
            newItem.className = 'item';
            newItem.innerText = result;
            newItem.draggable = true;
            newItem.ondragstart = drag;
            document.getElementById('inventory').appendChild(newItem);
        }

        // Update canvas: remove old, add new result
        createCanvasItem(result, parseInt(targetElement.style.left), parseInt(targetElement.style.top));
        targetElement.remove();
        status.innerText = "";
    }

    async function fetchGeminiCombination(a, b) {
        const prompt = `You are an Infinite Craft game engine. 
        Combine "${a}" and "${b}" to create a new single word or short phrase. 
        Respond ONLY with the result and a single relevant emoji. 
        Example: Fire + Water = 💨 Steam. 
        Result:`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await response.json();
            return data.candidates[0].content.parts[0].text.trim();
        } catch (e) {
            return "❓ Unknown";
        }
    }
</script>
</body>
</html>
