<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace-r | Dashboard</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        :root {
            --pill-bg: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
            --accent: #00a2ff;
            --danger: #ff3333;
            --pvp: #ffaa00;
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* --- DASHBOARD UI --- */
        #ui-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .pill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .pill {
            background: var(--pill-bg);
            border: 1px solid var(--border);
            backdrop-filter: blur(15px);
            border-radius: 100px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .interactive:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            transform: translateY(-2px);
        }

        .server-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 60%;
            margin: auto;
        }

        .server-card {
            height: 80px;
            justify-content: center;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
        }

        /* --- IDENTITY ELEMENTS --- */
        .avatar-box {
            width: 32px;
            height: 32px;
            background: #222;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .id-tag {
            opacity: 0.5;
            font-size: 0.85em;
            margin-left: 8px;
        }

        /* --- TERMINAL BAR --- */
        .terminal-pill {
            width: 50%;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.4);
        }

        .prompt { color: var(--accent); font-weight: bold; }

        input#terminal-input {
            background: transparent;
            border: none;
            color: white;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        /* --- VHS TRANSITION OVERLAY --- */
        #vhs-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: black;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in;
        }

        #vhs-overlay.vhs-active {
            opacity: 1;
            pointer-events: all;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .glitch-text {
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 2px 0 red, -2px 0 blue;
            animation: jitter 0.15s infinite;
            letter-spacing: 5px;
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, -2px); }
            100% { transform: translate(0,0); }
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; }
        .online { background: #00ff88; box-shadow: 0 0 10px #00ff88; }
        .pvp { background: var(--pvp); }
        .danger { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

    </style>
</head>
<body>

    <div id="vhs-overlay">
        <div class="scanlines"></div>
        <div class="vhs-content">
            <h1 class="glitch-text" data-text="[ NO SIGNAL ]">[ NO SIGNAL ]</h1>
            <p id="boot-status" style="text-align: center; opacity: 0.7;">LINKING_SERVER_NODE...</p>
        </div>
    </div>

    <div id="ui-container">
        <header class="pill-row">
            <div id="login-pill" class="pill interactive entry" onclick="login()">
                CONNECT_IDENTITY
            </div>
            <div id="user-pill" class="pill entry" style="display:none;">
                <div class="avatar-box"><img id="pfp" src="" style="width:100%"></div>
                <div class="user-meta">
                    <span id="username">---</span>
                    <span id="base36-id" class="id-tag">#0000</span>
                </div>
            </div>
            <div class="pill entry">
                <span style="color: var(--danger); font-weight: bold;">HP:</span>
                <span id="hp-val">20.0</span>
            </div>
        </header>

        <main class="server-grid">
            <div class="pill entry server-card interactive" onclick="queueServer('survival')">
                <span class="dot online"></span> SURVIVAL_OS
            </div>
            <div class="pill entry server-card interactive" onclick="queueServer('creative')">
                <span class="dot online"></span> CREATIVE_OS
            </div>
            <div class="pill entry server-card interactive" onclick="queueServer('pvp')">
                <span class="dot pvp"></span> ARENA_PVP
            </div>
            <div class="pill entry server-card interactive" onclick="queueServer('lifesteal')">
                <span class="dot danger"></span> LIFESTEAL_V2
            </div>
        </main>

        <footer class="pill-row">
            <div class="pill entry terminal-pill">
                <span class="prompt">></span>
                <input type="text" id="terminal-input" placeholder="Type /queue [server]...">
            </div>
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // --- CONFIGURATION ---
    const firebaseConfig = {
    apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
    authDomain: "hyperspace-r.firebaseapp.com",
    databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hyperspace-r",
    storageBucket: "hyperspace-r.firebasestorage.app",
    messagingSenderId: "1050495683444",
    appId: "1:1050495683444:web:846c42d274197b20313a21",
    measurementId: "G-8RC2TB95T7"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // --- AUTH & BASE36 IDENTITY ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, "users", user.uid);
                const snap = await getDoc(userRef);

                if (!snap.exists()) {
                    // Automate Identity Creation
                    const b36 = Date.now().toString(36).toUpperCase();
                    currentUser = {
                        username: user.displayName.split(' ')[0],
                        base36: b36,
                        health: 20.0,
                        skin: user.photoURL
                    };
                    await setDoc(userRef, currentUser);
                    await setDoc(doc(db, "ids", b36), { uid: user.uid });
                } else {
                    currentUser = snap.data();
                }
                updateDashboard(currentUser);
            }
        });

        function updateDashboard(data) {
            document.getElementById('login-pill').style.display = 'none';
            document.getElementById('user-pill').style.display = 'flex';
            document.getElementById('username').innerText = data.username;
            document.getElementById('base36-id').innerText = `#${data.base36}`;
            document.getElementById('hp-val').innerText = data.health.toFixed(1);
            document.getElementById('pfp').src = `https://minotar.net/helm/${data.username}/32.png`;
        }

        // --- COMMAND & PHYSICS TRANSITION ---
        window.queueServer = function(mode) {
            initPhysicsCrash();

            setTimeout(() => {
                document.getElementById('vhs-overlay').classList.add('vhs-active');
                document.getElementById('boot-status').innerText = `ESTABLISHING_HANDSHAKE_${mode.toUpperCase()}...`;
            }, 800);

            setTimeout(() => {
                window.location.href = `mcc.html?mode=${mode}`;
            }, 3500);
        };

        function initPhysicsCrash() {
            const { Engine, Runner, Bodies, Composite } = Matter;
            const engine = Engine.create();
            const elements = document.querySelectorAll('.entry');

            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                const body = Bodies.rectangle(
                    rect.left + rect.width / 2, 
                    rect.top + rect.height / 2, 
                    rect.width, rect.height
                );
                
                el.style.position = 'fixed';
                el.style.width = (rect.width - 48) + 'px'; // Handle padding
                el.style.zIndex = '10';

                (function update() {
                    el.style.left = (body.position.x - rect.width / 2) + 'px';
                    el.style.top = (body.position.y - rect.height / 2) + 'px';
                    el.style.transform = `rotate(${body.angle}rad)`;
                    requestAnimationFrame(update);
                })();
                Composite.add(engine.world, body);
            });

            Composite.add(engine.world, Bodies.rectangle(window.innerWidth/2, window.innerHeight + 100, window.innerWidth, 100, { isStatic: true }));
            Runner.run(engine);
        }

        // Terminal Listener
        document.getElementById('terminal-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase();
                if (val.startsWith('/queue ')) {
                    queueServer(val.split(' ')[1]);
                }
                e.target.value = '';
            }
        });

        window.login = () => signInWithPopup(auth, new GoogleAuthProvider());
    </script>
</body>
</html>
