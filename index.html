<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperspace-R | Terminal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; --green: #00ff41; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #scanner { width: 300px; border-right: 2px solid #222; background: #000; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .btn-ui { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--red); color: var(--red); cursor: pointer; margin-bottom: 10px; font-family: inherit; }
        .btn-ui:disabled { opacity: 0.3; cursor: not-allowed; }
        .file-label { border: 1px dashed var(--gold); color: var(--gold); padding: 10px; display: block; text-align: center; cursor: pointer; font-size: 0.7rem; margin-bottom: 20px; }
        
        /* FREQUENCY DISPLAY */
        #main { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #viewport { width: 90%; height: 60%; border: 2px solid #222; background: #050505; overflow-y: auto; padding: 20px; display: flex; flex-wrap: wrap; gap: 15px; }
        
        .mhz-display { font-size: 5rem; color: var(--gold); margin: 0; text-shadow: 0 0 15px var(--gold); }
        #dial { width: 160px; height: 160px; border: 8px solid #333; border-radius: 50%; position: relative; cursor: grab; background: #111; margin: 15px; }
        #knob { position: absolute; inset: 0; pointer-events: none; }
        #knob::after { content: ''; position: absolute; top: 10px; left: 50%; width: 6px; height: 20px; background: var(--red); transform: translateX(-50%); }

        /* DATA CARDS */
        .card { border: 1px solid var(--green); padding: 10px; background: #000; color: var(--green); width: 180px; font-size: 0.7rem; }
        .property { border-color: var(--gold); color: var(--gold); }
        
        #boot-overlay { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="scanner">
    <div style="color:var(--gold); font-size: 0.8rem; margin-bottom: 15px;">[ SIGNAL COMMAND ]</div>
    
    <label class="file-label">
        INSERT CARTRIDGE
        <input type="file" id="loader" style="display:none" onchange="loadCartridge(this.files)">
    </label>

    <button id="host-btn" class="btn-ui" onclick="toggleHost()" disabled>INITIALIZE HOST</button>
    <button id="join-btn" class="btn-ui" onclick="toggleJoin()" disabled style="border-color:var(--green); color:var(--green);">TUNE IN</button>
    
    <div id="status-log" style="font-size: 0.6rem; color: #444; margin-top: 20px;">SYSTEM READY.</div>
</div>

<div id="main">
    <div id="boot-overlay"><button class="btn-ui" style="width:200px" onclick="powerOn()">LOGIN AS AIAN</button></div>
    
    <div class="mhz-display" id="freq-text">88.0</div>
    <div id="dial"><div id="knob"></div></div>
    
    <div id="viewport">
        <div style="color:#222; margin:auto;">[ NO SIGNAL DETECTED ]</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:42d7284bee34d749313a21",
        measurementId: "G-RRQTTD9M4V"
    };

    let db, auth, userProfile, mhz = 88.0, activeSignals = {}, cartridgeData = null, isHosting = false;

    async function powerOn() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        userProfile = { uid: res.user.uid, name: res.user.displayName };
        document.getElementById('boot-overlay').style.display = 'none';
        
        // Start Global Scanner
        db.collection("matches").onSnapshot(snap => {
            activeSignals = {};
            snap.forEach(doc => activeSignals[doc.id] = doc.data());
            updateUI();
        });
    }

    // --- CARTRIDGE LOGIC ---
    function loadCartridge(files) {
        const reader = new FileReader();
        const file = files[0];
        const ext = file.name.split('.').pop();

        reader.onload = (e) => {
            const lines = e.target.result.split('\n').filter(l => l.includes(':'));
            cartridgeData = {
                type: ext,
                items: lines.map(line => {
                    const obj = {};
                    line.replace(/[\[\]]/g, '').split('+').forEach(p => {
                        const [k, v] = p.split(':').map(s => s.trim());
                        obj[k] = v;
                    });
                    return obj;
                })
            };
            document.getElementById('status-log').innerText = `CARTRIDGE LOADED: ${file.name}`;
            updateUI();
        };
        reader.readAsText(file);
    }

    // --- HOST / JOIN ACTIONS ---
    async function toggleHost() {
        const id = mhz.toString().replace('.', '');
        if (isHosting) {
            await db.collection("matches").doc(id).delete();
            isHosting = false;
        } else {
            await db.collection("matches").doc(id).set({
                mhz: mhz,
                host: userProfile.name,
                type: cartridgeData.type,
                payload: cartridgeData.items,
                active: true
            });
            isHosting = true;
        }
        updateUI();
    }

    function toggleJoin() {
        renderViewport();
        document.getElementById('status-log').innerText = `TUNED TO ${mhz} MHz`;
    }

    // --- INTERFACE ENGINE ---
    function updateUI() {
        const id = mhz.toString().replace('.', '');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');

        hostBtn.disabled = !cartridgeData || (activeSignals[id] && !isHosting);
        hostBtn.innerText = isHosting ? "TERMINATE SIGNAL" : "INITIALIZE HOST";
        
        joinBtn.disabled = !activeSignals[id];
        renderViewport();
    }

    function renderViewport() {
        const id = mhz.toString().replace('.', '');
        const view = document.getElementById('viewport');
        const data = activeSignals[id];

        if (!data) {
            view.innerHTML = `<div style="color:#222; margin:auto;">[ STATIC ]</div>`;
            return;
        }

        view.innerHTML = "";
        data.payload.forEach(item => {
            const card = document.createElement('div');
            card.className = `card ${data.type === 'properties' ? 'property' : ''}`;
            let content = `<strong>${item.name || item.prtyname || 'ITEM'}</strong><hr style="border:0; border-top:1px solid currentColor; margin:5px 0;">`;
            for (let [k, v] of Object.entries(item)) {
                if (k !== 'name' && k !== 'prtyname') content += `<div>${k}: ${v}</div>`;
            }
            card.innerHTML = content;
            view.appendChild(card);
        });
    }

    // --- DIAL PHYSICS ---
    const dial = document.getElementById('dial');
    dial.onmousedown = () => {
        window.onmousemove = (e) => {
            const rect = dial.getBoundingClientRect();
            const angle = Math.atan2(e.clientY - (rect.top + 80), e.clientX - (rect.left + 80)) * (180 / Math.PI) + 90;
            document.getElementById('knob').style.transform = `rotate(${angle}deg)`;
            mhz = (88 + (((angle % 360 + 360) % 360) / 360) * 20).toFixed(1);
            document.getElementById('freq-text').innerText = mhz;
            updateUI();
        };
    };
    window.onmouseup = () => window.onmousemove = null;

</script>
</body>
</html>
