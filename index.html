<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperspace-R | Signal Scanner</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; --bg: #0a0a0a; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; }
        
        /* LEFT SCANNER PANEL */
        #scanner { width: 320px; background: #000; border-right: 2px solid #222; display: flex; flex-direction: column; z-index: 20; }
        #scanner-header { padding: 20px; border-bottom: 1px solid #222; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; }
        #server-list { flex-grow: 1; overflow-y: auto; padding: 10px; }
        .server-card { background: #111; border: 1px solid #333; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .server-card:hover { border-color: var(--gold); background: #1a1a1a; }
        .server-card.active { border-color: var(--red); background: #200; }

        /* RIGHT CONSOLE */
        #main { flex-grow: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #static { position: fixed; inset: 0; opacity: 0.05; pointer-events: none; background: url('https://media.giphy.com/media/oEI9uWUicKgR6/giphy.gif'); }

        .mhz-display { font-size: 7rem; color: var(--gold); text-shadow: 0 0 30px var(--gold); margin: 0; z-index: 10; }
        
        /* DIAL */
        #dial-container { width: 280px; height: 280px; border: 12px solid #222; border-radius: 50%; background: radial-gradient(circle, #222, #000); position: relative; cursor: grab; z-index: 10; margin: 20px; }
        #knob { position: absolute; inset: 0; transition: transform 0.1s ease-out; pointer-events: none; }
        #knob::after { content: ''; position: absolute; top: 15px; left: 50%; width: 10px; height: 35px; background: var(--red); transform: translateX(-50%); box-shadow: 0 0 15px var(--red); }

        /* BUTTONS */
        .controls { display: flex; gap: 20px; z-index: 10; width: 400px; }
        button { flex: 1; padding: 20px; font-weight: bold; cursor: pointer; border: 2px solid var(--red); background: #000; color: var(--red); text-transform: uppercase; transition: 0.3s; }
        button:disabled { border-color: #222; color: #333; cursor: not-allowed; opacity: 0.4; filter: grayscale(1); }
        
        #join-btn { border-color: #00ff00; color: #00ff00; }
        #join-btn:hover:not(:disabled) { background: #00ff00; color: #000; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="static"></div>

<div id="scanner">
    <div id="scanner-header">Airwave Scanner</div>
    <div id="server-list">
        <p style="font-size: 0.7rem; color: #444; padding: 10px;">SCANNING...</p>
    </div>
</div>

<div id="main">
    <div id="boot-overlay" style="position:fixed; inset:0; z-index:100; background:#000; display:flex; align-items:center; justify-content:center;">
        <button onclick="powerOn()" style="width:300px;">POWER ON HARDWARE</button>
    </div>

    <h1 class="mhz-display" id="freq-readout">88.0</h1>
    
    <div id="dial-container">
        <div id="knob"></div>
    </div>

    <div class="controls">
        <button id="host-btn" onclick="startSession('host')">Host Signal</button>
        <button id="join-btn" onclick="startSession('join')" disabled>Join Signal</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:42d7284bee34d749313a21",
        measurementId: "G-RRQTTD9M4V"
    };

    let db, auth, rtdb, userProfile, mhz = 88.0, activeMatches = {};

    function powerOn() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        rtdb = firebase.database();
        
        document.getElementById('boot-overlay').classList.add('hidden');

        // Anonymous login for testing, change to Google if preferred
        auth.signInAnonymously().then(user => {
            userProfile = { username: "OP_" + Math.floor(Math.random()*999), uid: user.user.uid };
            initScanner();
        });
    }

    // --- DIAL PHYSICS ---
    const dial = document.getElementById('dial-container');
    const knob = document.getElementById('knob');
    let isDragging = false;

    dial.onmousedown = () => isDragging = true;
    window.onmouseup = () => isDragging = false;
    window.onmousemove = (e) => {
        if (!isDragging) return;
        const rect = dial.getBoundingClientRect();
        const angle = Math.atan2(e.clientY - (rect.top + 140), e.clientX - (rect.left + 140)) * (180 / Math.PI) + 90;
        knob.style.transform = `rotate(${angle}deg)`;
        
        const norm = (angle % 360 + 360) % 360;
        mhz = (88 + (norm / 360) * 20).toFixed(1);
        document.getElementById('freq-readout').innerText = mhz;
        updateButtonStates();
    };

    // --- SCANNER / SERVER LIST ---
    function initScanner() {
        db.collection("matches").onSnapshot(snapshot => {
            const list = document.getElementById('server-list');
            list.innerHTML = "";
            activeMatches = {};

            if (snapshot.empty) {
                list.innerHTML = `<p style="font-size:0.7rem; color:#444; padding:10px;">NO ACTIVE SIGNALS</p>`;
            }

            snapshot.forEach(doc => {
                const data = doc.data();
                activeMatches[doc.id] = data;

                const card = document.createElement('div');
                card.className = 'server-card';
                card.innerHTML = `
                    <div style="color:var(--gold); font-weight:bold;">${data.mhz} MHz</div>
                    <div style="font-size:0.7rem; color:#888;">ID: ${doc.id}</div>
                    <div style="font-size:0.7rem; color:#888;">USERS: ${data.players.length}</div>
                `;
                card.onclick = () => {
                    mhz = data.mhz;
                    document.getElementById('freq-readout').innerText = mhz;
                    const rot = ((mhz - 88) / 20) * 360;
                    knob.style.transform = `rotate(${rot}deg)`;
                    updateButtonStates();
                };
                list.appendChild(card);
            });
            updateButtonStates();
        });
    }

    // --- BUTTON LOGIC ---
    function updateButtonStates() {
        const folderID = mhz.toString().replace('.', '');
        const hostBtn = document.getElementById('host-btn');
        const joinBtn = document.getElementById('join-btn');

        if (activeMatches[folderID]) {
            hostBtn.disabled = true;
            hostBtn.innerText = "OCCUPIED";
            joinBtn.disabled = false;
        } else {
            hostBtn.disabled = false;
            hostBtn.innerText = "HOST SIGNAL";
            joinBtn.disabled = true;
        }
    }

    // --- DATA WRITES (FSDB + RTDB) ---
    async function startSession(mode) {
        const folderID = mhz.toString().replace('.', '');
        const docRef = db.collection("matches").doc(folderID);

        if (mode === 'host') {
            try {
                await docRef.set({
                    mhz: mhz,
                    host: userProfile.username,
                    players: [userProfile.username],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // RTDB Presence Guard
                const pRef = rtdb.ref(`broadcast_presence/${folderID}`);
                pRef.set({ active: true, owner: userProfile.uid });
                
                // If the socket drops, kill the FSDB entry
                pRef.onDisconnect().remove().then(() => {
                    docRef.delete();
                });
                
                alert(`Broadcast started on folder: ${folderID}`);
            } catch (e) {
                console.error("Write Error:", e);
                alert("Permission Denied. Check Firestore Rules.");
            }
        } else {
            await docRef.update({
                players: firebase.firestore.FieldValue.arrayUnion(userProfile.username)
            });
            alert(`Signal Joined: ${mhz} MHz`);
        }
    }
</script>
</body>
</html>
