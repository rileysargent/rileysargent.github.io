<!DOCTYPE html>
<html>
<head>
    <title>Llama 3.1 Narrabri Debugger</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 20px; }
        textarea { width: 100%; height: 200px; background: #161b22; color: #79c0ff; border: 1px solid #30363d; padding: 10px; border-radius: 6px; }
        button { background: #238636; color: white; border: none; padding: 15px 30px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        button:disabled { background: #1b4b27; color: #888; }
        #output { background: #000; padding: 15px; border-radius: 6px; margin-top: 20px; white-space: pre-wrap; border: 1px solid #30363d; color: #d1d5da; }
        #status { font-size: 14px; margin: 10px 0; color: #e3b341; }
    </style>
</head>
<body>
    <h2>Llama 3.1 <span style="color:#238636">API Fix</span></h2>
    <textarea id="prompt" placeholder="Paste your code here..."></textarea><br>
    <button id="runBtn">RECONSTRUCT CODE</button>
    <div id="status">Ready</div>
    <div id="output">Output will appear here...</div>

    <script>
        const HF_TOKEN = "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";
        // Use the v1 endpoint which is more CORS-friendly for Llama 3
        const API_URL = "https://api-inference.huggingface.co/v1/chat/completions";

        const runBtn = document.getElementById('runBtn');
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');

        runBtn.addEventListener('click', async () => {
            const promptText = document.getElementById('prompt').value;
            if (!HF_TOKEN.startsWith("hf_")) {
                statusDiv.innerText = "Error: Invalid Token Format";
                return;
            }

            statusDiv.innerText = "Connecting... (Wait up to 30s for model to load)";
            runBtn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${HF_TOKEN}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        model: "meta-llama/Llama-3.1-8B-Instruct",
                        messages: [{ role: "user", content: promptText }],
                        max_tokens: 2048,
                        temperature: 0.2
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    outputDiv.innerText = data.choices[0].message.content;
                    statusDiv.style.color = "#238636";
                    statusDiv.innerText = "Success!";
                } else {
                    statusDiv.style.color = "#f85149";
                    statusDiv.innerText = `Error: ${data.error || response.statusText}`;
                    if (response.status === 503) statusDiv.innerText += " (Model is loading, try again in 20s)";
                }
            } catch (err) {
                statusDiv.style.color = "#f85149";
                statusDiv.innerText = "Fetch Failed. Check internet or Token permissions.";
                console.error(err);
            } finally {
                runBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
