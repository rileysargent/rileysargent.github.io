<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Pro - Room List & Participants</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body { font-family: 'Roboto', sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 900px; width: 100%; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); }
        .videos { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 20px 0; }
        video { width: 100%; background: #1a1a1a; border-radius: 12px; transform: rotateY(180deg); }
        #localVideo { border: 3px solid #6200ee; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
        .room-card { background: #fff; border: 1px solid #ddd; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .participant-chip { display: inline-block; padding: 4px 10px; background: #e0e0e0; border-radius: 15px; font-size: 0.8em; margin: 2px; }
        .hidden { display: none !important; }
        .room-id-display { background: #eee; padding: 10px; border-radius: 5px; font-family: monospace; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">Real-Time Video Lobby</h2>
    
    <div class="controls">
        <input type="text" id="userName" class="mdc-text-field__input" style="border: 1px solid #ccc; padding: 10px; border-radius: 5px;" placeholder="Your Name...">
        <button class="mdc-button mdc-button--raised" id="cameraBtn">1. Enable Camera</button>
        <button class="mdc-button mdc-button--raised" id="createBtn" disabled>2. Start New Call</button>
        <button class="mdc-button mdc-button--raised" style="background: #d32f2f" id="hangupBtn" class="hidden">End Call</button>
    </div>

    <div id="activeRoomInfo" class="hidden" style="margin-bottom: 20px; text-align: center;">
        <p>You are in a call. Room ID: <span id="displayId" class="room-id-display"></span></p>
        <div id="participantsList"></div>
    </div>

    <div class="videos">
        <video id="localVideo" muted autoplay playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <div id="lobbySection">
        <h3>Active Calls (Click to Join)</h3>
        <div id="roomsContainer">Looking for active calls...</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, getDoc, updateDoc, onSnapshot, setDoc, deleteDoc, query, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:4a3c2b294542cb8d313a21"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let peerConnection = null;
    let localStream = null;
    let remoteStream = null;
    let currentRoomId = null;

    // Login and Start Lobby
    signInAnonymously(auth).then(() => {
        console.log("Auth Active");
        updateLobby();
    });

    // Step 1: Camera
    document.getElementById('cameraBtn').onclick = async () => {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            remoteStream = new MediaStream();
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('createBtn').disabled = false;
            document.getElementById('cameraBtn').disabled = true;
        } catch (e) { alert("Camera access denied"); }
    };

    // Step 2: Create Call
    document.getElementById('createBtn').onclick = async () => {
        const name = document.getElementById('userName').value || "Anonymous";
        const roomRef = doc(collection(db, 'rooms'));
        currentRoomId = roomRef.id;

        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        setupSignaling(roomRef, false);

        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);

        await setDoc(roomRef, {
            offer: { type: offer.type, sdp: offer.sdp },
            callerName: name,
            status: 'waiting',
            createdAt: serverTimestamp()
        });

        // Add to participants list
        await setDoc(doc(db, `rooms/${currentRoomId}/participants`, auth.currentUser.uid), { name: name });

        showCallUI(currentRoomId);
        
        onSnapshot(roomRef, async snap => {
            const data = snap.data();
            if (!peerConnection.currentRemoteDescription && data?.answer) {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            }
        });
    };

    // Step 3: Join Call (Global function for list)
    window.joinCall = async (roomId) => {
        const name = document.getElementById('userName').value || "Guest";
        const roomRef = doc(db, 'rooms', roomId);
        const roomSnapshot = await getDoc(roomRef);

        if (!roomSnapshot.exists()) return alert("Room closed");

        currentRoomId = roomId;
        peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
        setupSignaling(roomRef, true);

        await peerConnection.setRemoteDescription(new RTCSessionDescription(roomSnapshot.data().offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await updateDoc(roomRef, {
            answer: { type: answer.type, sdp: answer.sdp },
            status: 'active'
        });

        await setDoc(doc(db, `rooms/${currentRoomId}/participants`, auth.currentUser.uid), { name: name });
        showCallUI(currentRoomId);
    };

    // Lobby Listener (List of People/Rooms)
    function updateLobby() {
        const q = query(collection(db, 'rooms'), limit(20));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('roomsContainer');
            container.innerHTML = '';
            
            snapshot.forEach((roomDoc) => {
                const data = roomDoc.data();
                if (data.status === 'active' || data.status === 'waiting') {
                    const card = document.createElement('div');
                    card.className = 'room-card';
                    card.innerHTML = `
                        <div>
                            <strong>${data.callerName}'s Call</strong><br>
                            <small>ID: ${roomDoc.id}</small>
                        </div>
                        <button class="mdc-button mdc-button--outlined" onclick="joinCall('${roomDoc.id}')">JOIN</button>
                    `;
                    container.appendChild(card);
                }
            });
            if (container.innerHTML === '') container.innerHTML = "No active rooms. Be the first to start one!";
        });
    }

    function setupSignaling(roomRef, isCallee) {
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        
        peerConnection.onicecandidate = e => {
            if (e.candidate) {
                const col = isCallee ? 'calleeCandidates' : 'callerCandidates';
                addDoc(collection(roomRef, col), e.candidate.toJSON());
            }
        };

        peerConnection.ontrack = e => {
            e.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
        };

        const remoteCol = isCallee ? 'callerCandidates' : 'calleeCandidates';
        onSnapshot(collection(roomRef, remoteCol), snap => {
            snap.docChanges().forEach(change => {
                if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
            });
        });

        // Participant List Listener (Max 20)
        onSnapshot(query(collection(roomRef, 'participants'), limit(20)), snap => {
            const pList = document.getElementById('participantsList');
            pList.innerHTML = 'Participants: ';
            snap.forEach(pDoc => {
                pList.innerHTML += `<span class="participant-chip">${pDoc.data().name}</span>`;
            });
        });
    }

    function showCallUI(id) {
        document.getElementById('displayId').innerText = id;
        document.getElementById('activeRoomInfo').classList.remove('hidden');
        document.getElementById('lobbySection').classList.add('hidden');
        document.getElementById('createBtn').classList.add('hidden');
        document.getElementById('hangupBtn').classList.remove('hidden');
    }

document.getElementById('hangupBtn').onclick = async () => {
    if (currentRoomId) {
        const roomRef = doc(db, 'rooms', currentRoomId);
        
        // 1. Update status to 'ended' so it disappears from lists immediately
        try {
            await updateDoc(roomRef, { status: 'ended' });
            
            // 2. Delete the document to keep the database clean
            await deleteDoc(roomRef);
            console.log("Room cleaned up successfully.");
        } catch (error) {
            console.error("Error cleaning up room:", error);
        }
    }
    
    // 3. Stop all camera/mic tracks
    if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
    }
    
    // 4. Refresh to reset the state
    location.reload();
};

</script>
</body>
</html>
