<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperspace-R | Signal Broadcaster</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; --green: #00ff41; --panel: #111; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #scanner { width: 320px; border-right: 2px solid #222; background: #000; display: flex; flex-direction: column; z-index: 20; padding: 20px; box-sizing: border-box; }
        .file-box { border: 1px dashed var(--red); padding: 15px; text-align: center; margin-bottom: 20px; cursor: pointer; font-size: 0.7rem; color: var(--gold); }
        .file-box:hover { background: #150000; }
        input[type="file"] { display: none; }
        
        #active-signals { flex-grow: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .sig-card { background: var(--panel); border: 1px solid #333; padding: 10px; margin-bottom: 8px; font-size: 0.7rem; cursor: pointer; }
        .sig-card:hover { border-color: var(--gold); }

        /* MAIN DECK */
        #main { flex-grow: 1; display: flex; flex-direction: column; position: relative; align-items: center; justify-content: center; background: radial-gradient(circle, #1a0000 0%, #000 100%); }
        #game-screen { width: 85%; height: 65%; border: 4px solid #222; background: #000; display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; overflow-y: auto; align-content: flex-start; }
        
        /* CARDS & PROPERTIES UI */
        .game-obj { background: #0a0a0a; border: 1px solid var(--green); padding: 12px; width: 200px; font-size: 0.75rem; color: var(--green); position: relative; }
        .game-obj.property { border-color: var(--gold); color: var(--gold); }
        .obj-header { border-bottom: 1px solid currentColor; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }

        /* HARDWARE CONTROLS */
        .dial-zone { display: flex; align-items: center; gap: 20px; margin-top: 20px; z-index: 10; }
        .mhz-text { font-size: 4rem; color: var(--gold); text-shadow: 0 0 15px var(--gold); width: 200px; text-align: center; }
        #dial { width: 140px; height: 140px; border: 10px solid #222; border-radius: 50%; position: relative; cursor: grab; background: #111; }
        #knob { position: absolute; inset: 0; pointer-events: none; }
        #knob::after { content: ''; position: absolute; top: 10px; left: 50%; width: 6px; height: 25px; background: var(--red); transform: translateX(-50%); box-shadow: 0 0 10px var(--red); }
        
        #boot-overlay { position: fixed; inset: 0; z-index: 100; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-auth { padding: 20px 40px; background: black; color: red; border: 2px solid red; font-family: inherit; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="scanner">
    <div style="color:var(--gold); font-size: 0.9rem; margin-bottom: 20px;">HYPERSPACE-R SCANNER</div>
    
    <label class="file-box">
        INJECT DATA CARTRIDGE (.cards / .properties / .zip)
        <input type="file" id="file-input" onchange="importData(this.files)">
    </label>

    <div id="active-signals">
        <div style="color:#444; font-size:0.6rem;">SCANNING FREQUENCIES...</div>
    </div>
</div>

<div id="main">
    <div id="boot-overlay">
        <button class="btn-auth" onclick="powerOn()">AUTHORIZE PILOT: AIAN</button>
        <p id="boot-status" style="margin-top:10px; font-size:0.7rem; color:#333;"></p>
    </div>

    <div id="game-screen">
        <div style="color:#222; width:100%; text-align:center; margin-top:20%;">[ NO SIGNAL DETECTED ]</div>
    </div>

    <div class="dial-zone">
        <div class="mhz-text" id="freq-val">88.0</div>
        <div id="dial"><div id="knob"></div></div>
        <button id="broadcast-btn" onclick="toggleBroadcast()" style="padding:15px; background:transparent; border:1px solid var(--red); color:var(--red); cursor:pointer;">BROADCAST</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:42d7284bee34d749313a21",
        measurementId: "G-RRQTTD9M4V"
    };

    let db, auth, userProfile, mhz = 88.0, activeSignals = {}, currentUnsub = null;

    async function powerOn() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
        const res = await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
        userProfile = { uid: res.user.uid, name: res.user.displayName };
        document.getElementById('boot-overlay').style.display = 'none';
        listenForSignals();
    }

    // --- DATA IMPORT & BROADCAST ---
    function importData(files) {
        const file = files[0];
        const reader = new FileReader();
        const ext = file.name.split('.').pop();

        reader.onload = async (e) => {
            const raw = e.target.result;
            const lines = raw.split('\n').filter(l => l.trim().length > 0);
            
            // Format: [key: val + key: val]
            const parsedObjects = lines.map(line => {
                const clean = line.replace(/[\[\]]/g, '');
                const obj = {};
                clean.split('+').forEach(part => {
                    const [k, v] = part.split(':').map(s => s.trim());
                    if(k && v) obj[k] = v;
                });
                return obj;
            });

            broadcastToFrequency(parsedObjects, ext);
        };
        reader.readAsText(file);
    }

    async function broadcastToFrequency(data, type) {
        const id = mhz.toString().replace('.', '');
        await db.collection("matches").doc(id).set({
            mhz: mhz,
            host: userProfile.name,
            type: type,
            payload: data,
            timestamp: Date.now()
        });
        alert(`Broadcasting ${type.toUpperCase()} data on ${mhz} MHz`);
    }

    // --- SIGNAL LISTENER ---
    function listenForSignals() {
        db.collection("matches").onSnapshot(snap => {
            const container = document.getElementById('active-signals');
            container.innerHTML = "";
            activeSignals = {};
            
            snap.forEach(doc => {
                const data = doc.data();
                activeSignals[doc.id] = data;
                const card = document.createElement('div');
                card.className = 'sig-card';
                card.innerHTML = `FREQ: ${data.mhz} MHz<br>TYPE: .${data.type}<br>HOST: ${data.host}`;
                card.onclick = () => tuneTo(data.mhz);
                container.appendChild(card);
            });
            syncGameScreen();
        });
    }

    function syncGameScreen() {
        const id = mhz.toString().replace('.', '');
        const screen = document.getElementById('game-screen');
        const data = activeSignals[id];

        if (!data) {
            screen.innerHTML = `<div style="color:#222; width:100%; text-align:center; margin-top:20%;">[ WHITE NOISE ]</div>`;
            return;
        }

        screen.innerHTML = "";
        data.payload.forEach(obj => {
            const el = document.createElement('div');
            el.className = `game-obj ${data.type === 'properties' ? 'property' : ''}`;
            
            let inner = `<div class="obj-header">${obj.name || obj.prtyname || "OBJECT"}</div>`;
            for (let [k, v] of Object.entries(obj)) {
                if (k !== 'name' && k !== 'prtyname') {
                    inner += `<div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                        <span style="opacity:0.5">${k.toUpperCase()}:</span>
                        <span>${v}</span>
                    </div>`;
                }
            }
            el.innerHTML = inner;
            screen.appendChild(el);
        });
    }

    // --- HARDWARE DIAL ---
    const dial = document.getElementById('dial');
    dial.onmousedown = () => {
        window.onmousemove = (e) => {
            const rect = dial.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const angle = Math.atan2(e.clientY - cy, e.clientX - cx) * (180 / Math.PI) + 90;
            document.getElementById('knob').style.transform = `rotate(${angle}deg)`;
            mhz = (88 + (((angle % 360 + 360) % 360) / 360) * 20).toFixed(1);
            document.getElementById('freq-val').innerText = mhz;
            syncGameScreen();
        };
    };
    window.onmouseup = () => window.onmousemove = null;

    function tuneTo(freq) {
        mhz = freq;
        document.getElementById('freq-val').innerText = mhz;
        const angle = ((freq - 88) / 20) * 360;
        document.getElementById('knob').style.transform = `rotate(${angle}deg)`;
        syncGameScreen();
    }
</script>
</body>
</html>
