<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>WebRTC Firebase Call</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <style>
        body { font-family: Roboto, sans-serif; padding: 20px; }
        .videos { display: flex; gap: 10px; margin-top: 20px; }
        video { width: 45%; background: #222; border-radius: 8px; }
        #buttons { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h2>WebRTC Video Call</h2>
    <div id="buttons">
        <button class="mdc-button mdc-button--raised" id="cameraBtn">
            <span class="mdc-button__label">Open Camera & Mic</span>
        </button>
        <button class="mdc-button mdc-button--raised" id="createBtn" disabled>
            <span class="mdc-button__label">Create Room</span>
        </button>
        <button class="mdc-button mdc-button--raised" id="joinBtn" disabled>
            <span class="mdc-button__label">Join Room</span>
        </button>
        <button class="mdc-button mdc-button--raised" id="pipBtn" disabled>
            <span class="mdc-button__label">Window in Window</span>
        </button>
    </div>
    <div>
        <span id="currentRoom"></span>
    </div>
    <div class="videos">
        <video id="localVideo" muted autoplay playsinline></video>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, addDoc, getDoc, updateDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
            authDomain: "hyperspace-r.firebaseapp.com",
            projectId: "hyperspace-r",
            storageBucket: "hyperspace-r.appspot.com",
            messagingSenderId: "1050495683444",
            appId: "1:1050495683444:web:4a3c2b294542cb8d313a21"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // WebRTC Configuration (Google STUN servers)
        const configuration = {
            iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }]
        };

        let peerConnection = null;
        let localStream = null;
        let remoteStream = null;
        let roomId = null;

        // UI Elements
        const cameraBtn = document.querySelector('#cameraBtn');
        const createBtn = document.querySelector('#createBtn');
        const joinBtn = document.querySelector('#joinBtn');
        const pipBtn = document.querySelector('#pipBtn');
        const localVideo = document.querySelector('#localVideo');
        const remoteVideo = document.querySelector('#remoteVideo');

        // 1. Open User Media
        cameraBtn.addEventListener('click', async () => {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            remoteStream = new MediaStream();
            localVideo.srcObject = localStream;
            remoteVideo.srcObject = remoteStream;

            createBtn.disabled = false;
            joinBtn.disabled = false;
            pipBtn.disabled = false;
            cameraBtn.disabled = true;
        });

        // 2. Window-in-Window (PiP)
        pipBtn.addEventListener('click', async () => {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                } else {
                    await remoteVideo.requestPictureInPicture();
                }
            } catch (error) {
                console.error("PiP failed", error);
            }
        });

        // 3. Create Room (Caller)
        createBtn.addEventListener('click', async () => {
            const roomRef = doc(collection(db, 'rooms'));
            peerConnection = new RTCPeerConnection(configuration);
            
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Collect ICE
            const callerCandidatesCollection = collection(roomRef, 'callerCandidates');
            peerConnection.addEventListener('icecandidate', event => {
                if (event.candidate) addDoc(callerCandidatesCollection, event.candidate.toJSON());
            });

            // Create Offer
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            await setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp } });
            
            roomId = roomRef.id;
            document.querySelector('#currentRoom').innerText = `Room ID: ${roomId} (Send this to your friend)`;

            // Listen for Remote Stream
            peerConnection.addEventListener('track', event => {
                event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
            });

            // Listen for Answer
            onSnapshot(roomRef, async snapshot => {
                const data = snapshot.data();
                if (!peerConnection.currentRemoteDescription && data?.answer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                }
            });

            // Listen for Remote ICE
            onSnapshot(collection(roomRef, 'calleeCandidates'), snapshot => {
                snapshot.docChanges().forEach(change => {
                    if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                });
            });
        });

        // 4. Join Room (Callee)
        joinBtn.addEventListener('click', async () => {
            roomId = prompt("Enter Room ID:");
            const roomRef = doc(db, 'rooms', roomId);
            const roomSnapshot = await getDoc(roomRef);

            if (roomSnapshot.exists()) {
                peerConnection = new RTCPeerConnection(configuration);
                localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

                const calleeCandidatesCollection = collection(roomRef, 'calleeCandidates');
                peerConnection.addEventListener('icecandidate', event => {
                    if (event.candidate) addDoc(calleeCandidatesCollection, event.candidate.toJSON());
                });

                peerConnection.addEventListener('track', event => {
                    event.streams[0].getTracks().forEach(track => remoteStream.addTrack(track));
                });

                const offer = roomSnapshot.data().offer;
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                await updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });

                onSnapshot(collection(roomRef, 'callerCandidates'), snapshot => {
                    snapshot.docChanges().forEach(change => {
                        if (change.type === 'added') peerConnection.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    });
                });
            }
        });
    </script>
</body>
</html>
