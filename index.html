<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hyperspace-R | Data Link</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <style>
        :root { --red: #ff2a2a; --dark: #050505; --gold: #ffd700; }
        body { background: var(--dark); color: var(--red); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; }
        #terminal { flex-grow: 1; background: #000; border: 1px solid #333; padding: 15px; overflow-y: auto; font-size: 0.8rem; color: #0f0; margin-bottom: 10px; }
        .controls { display: flex; gap: 10px; }
        button { flex: 1; padding: 15px; background: #111; color: var(--red); border: 1px solid var(--red); cursor: pointer; font-weight: bold; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        input { background: #000; border: 1px solid #333; color: var(--gold); padding: 10px; text-align: center; font-size: 1.2rem; }
    </style>
</head>
<body>

<div id="terminal">> Awaiting System Initialization...</div>

<div style="text-align:center; margin-bottom:20px;">
    <h1 style="color:var(--gold); margin:0;">STATION MONITOR</h1>
    <p>Current Freq: <span id="mhz-label">88.0</span> MHz</p>
    <input type="range" min="88" max="108" step="0.1" value="88" style="width:100%;" oninput="updateFreq(this.value)">
</div>

<div class="controls">
    <button id="host-btn" onclick="hostSignal()">BROADCAST (FSDB + RTDB)</button>
    <button id="join-btn" onclick="joinSignal()" disabled>JOIN SIGNAL</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
        authDomain: "hyperspace-r.firebaseapp.com",
        databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "hyperspace-r",
        storageBucket: "hyperspace-r.firebasestorage.app",
        messagingSenderId: "1050495683444",
        appId: "1:1050495683444:web:42d7284bee34d749313a21",
        measurementId: "G-RRQTTD9M4V"
    };

    let db, rtdb, auth, mhz = "88.0", activeFreqs = {};

    function log(msg, color="#0f0") {
        const t = document.getElementById('terminal');
        t.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
        t.scrollTop = t.scrollHeight;
    }

    // --- INITIALIZE ---
    window.onload = () => {
        try {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
            rtdb = firebase.database();
            auth = firebase.auth();
            log("Firebase Systems Online.");

            auth.signInAnonymously().then(u => {
                log(`Authenticated as Anonymous Overlord: ${u.user.uid}`);
                syncScanner();
            });
        } catch (e) {
            log(`BOOT CRITICAL ERROR: ${e.message}`, "red");
        }
    };

    function updateFreq(val) {
        mhz = parseFloat(val).toFixed(1);
        document.getElementById('mhz-label').innerText = mhz;
        checkStatus();
    }

    // --- THE SCANNER ---
    function syncScanner() {
        log("Scanning Firestore for active frequency folders...");
        db.collection("matches").onSnapshot(snap => {
            activeFreqs = {};
            snap.forEach(doc => { activeFreqs[doc.id] = doc.data(); });
            log(`Scanner Update: ${snap.size} signals detected.`);
            checkStatus();
        }, err => log(`FSDB SCANNER ERROR: ${err.message}`, "red"));
    }

    function checkStatus() {
        const id = mhz.replace('.', '');
        const exists = activeFreqs[id];
        document.getElementById('host-btn').disabled = !!exists;
        document.getElementById('join-btn').disabled = !exists;
        if(exists) document.getElementById('host-btn').innerText = "OCCUPIED";
        else document.getElementById('host-btn').innerText = "BROADCAST";
    }

    // --- THE WRITES ---
    async function hostSignal() {
        const id = mhz.replace('.', '');
        log(`Creating FSDB Folder: [${id}]...`);
        
        try {
            // Write to Firestore (The Folder)
            await db.collection("matches").doc(id).set({
                mhz: mhz,
                host: "AIan_" + id,
                players: ["AIan_" + id],
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            log(`FSDB WRITE SUCCESS: Folder ${id} created.`, "var(--gold)");

            // Write to RTDB (The Life Support)
            log(`Connecting RTDB Life Support for ${id}...`);
            const presenceRef = rtdb.ref(`active_signals/${id}`);
            presenceRef.set({ status: "alive" });

            // Setup Disconnect Cleanup
            presenceRef.onDisconnect().remove().then(() => {
                db.collection("matches").doc(id).delete();
                log(`Presence Guard: Disconnect handler armed for ${id}.`);
            });

        } catch (e) {
            log(`WRITE FAILED: ${e.message}`, "red");
            log(`HINT: Check if Firestore Rules are set to 'allow read, write: if true;'`, "gray");
        }
    }

    async function joinSignal() {
        const id = mhz.replace('.', '');
        log(`Attempting to join signal ${id}...`);
        try {
            await db.collection("matches").doc(id).update({
                players: firebase.firestore.FieldValue.arrayUnion("Peer_" + Math.floor(Math.random()*99))
            });
            log("JOIN SUCCESSFUL.");
        } catch (e) {
            log(`JOIN ERROR: ${e.message}`, "red");
        }
    }
</script>
</body>
</html>
