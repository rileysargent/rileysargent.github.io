<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperspace-r | Game Client</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .hud {
            position: fixed; top: 20px; left: 20px; color: white;
            z-index: 10; pointer-events: none;
        }
        .pill {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 15px; border-radius: 50px; backdrop-filter: blur(5px);
            margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
        }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 id="status-text">INITIALIZING_SECURE_BOOT...</h1>
        <p id="sub-status">Checking Credentials...</p>
    </div>

    <div class="hud">
        <div class="pill">MODE: <span id="mode-label">---</span></div>
        <div class="pill">ID: <span id="id-label">#----</span></div>
        <div class="pill">HEALTH: <span id="hp-label">20.0</span></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- FIREBASE CONFIG (Must match your Dashboard) ---
  const firebaseConfig = {
    apiKey: "AIzaSyCr2mG-lVDHFwW4fTAx7_5AwZX2jJ8myrw",
    authDomain: "hyperspace-r.firebaseapp.com",
    databaseURL: "https://hyperspace-r-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "hyperspace-r",
    storageBucket: "hyperspace-r.firebasestorage.app",
    messagingSenderId: "1050495683444",
    appId: "1:1050495683444:web:846c42d274197b20313a21",
    measurementId: "G-8RC2TB95T7"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const rtdb = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        const gameMode = urlParams.get('mode') || 'survival';

        // --- 3D SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- AUTH-GATED INITIALIZATION ---
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                // If no user, kick them back to the dashboard to login
                window.location.href = 'index.html'; 
                return;
            }

            document.getElementById('sub-status').innerText = "Fetching Base36 Profile...";
            
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);

            if (snap.exists()) {
                const userData = snap.data();
                startWorld(userData);
            } else {
                // This happens if they bypassed the dashboard without making a profile
                document.getElementById('status-text').innerText = "PROFILE_NOT_FOUND";
                document.getElementById('sub-status').innerText = "Redirecting to Identity Setup...";
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        });

        function startWorld(profile) {
            // Update HUD with proper credentials
            document.getElementById('mode-label').innerText = gameMode.toUpperCase();
            document.getElementById('id-label').innerText = `#${profile.base36}`;
            document.getElementById('hp-label').innerText = profile.health;

            // Remove loading screen
            document.getElementById('loading-screen').style.display = 'none';

            // Add simple geometry so we can see it's working
            const grid = new THREE.GridHelper(100, 100, 0x00a2ff, 0x222222);
            scene.add(grid);
            
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);

            // Start Logic
            initMultiplayer(profile);
            animate();
        }

        function initMultiplayer(profile) {
            const playerRef = ref(rtdb, `servers/${gameMode}/players/${profile.base36}`);
            
            // Periodically sync position to RTDB
            setInterval(() => {
                set(playerRef, {
                    x: camera.position.x,
                    y: camera.position.y,
                    z: camera.position.z,
                    hp: profile.health,
                    ts: Date.now()
                });
            }, 100);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
